<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="코치 앱">
<title>부산아이파크 코치</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c26;
  --border:#2a2a3a; --text:#f0f0f5; --text2:#a0a0b8; --text3:#606078;
  --blue:#3b82f6; --green:#22c55e; --red:#ef4444; --amber:#f59e0b;
  --yellow:#eab308; --accent:#6366f1;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* Login */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
#login-screen h1{font-size:20px;font-weight:700;margin-bottom:4px}
#login-screen p{font-size:13px;color:var(--text3);margin-bottom:32px}
.login-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.login-form input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;font-size:15px;outline:none;width:100%}
.login-form input:focus{border-color:var(--blue)}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px 16px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.btn-primary:active{opacity:.8}
#login-error{font-size:12px;color:var(--red);text-align:center}

/* App */
#app{display:none}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px 10px}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header-title{font-size:16px;font-weight:700}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px}
.btn-logout{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(19,19,26,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;color:var(--text3)}
.nav-item.active .nav-label{color:var(--blue)}
.nav-item.active .nav-icon{filter:brightness(1.3)}

/* Pages */
.page{display:none}
.page.active{display:block}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin:12px 16px}
.card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Player row */
.player-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--border)}
.player-row:last-child{border-bottom:none}
.player-name{font-size:14px;font-weight:500}
.player-pos{font-size:11px;color:var(--text3);margin-top:1px}

/* Badges */
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-red{background:#3b121933;color:#f87171;border:1px solid #ef444440}
.badge-amber{background:#2a1a0033;color:#fbbf24;border:1px solid #f59e0b40}
.badge-yellow{background:#1a1a0033;color:#fde047;border:1px solid #eab30840}
.badge-green{background:#05301633;color:#4ade80;border:1px solid #22c55e40}
.badge-gray{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}

/* Well bars */
.well-bar-wrap{margin-bottom:10px}
.well-bar-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.well-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.well-bar-fill{height:100%;border-radius:3px}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{padding:6px 8px;text-align:center;color:var(--text3);font-weight:500;border-bottom:.5px solid var(--border);background:var(--surface2);white-space:nowrap}
.data-table th:first-child{text-align:left}
.data-table td{padding:7px 8px;text-align:center;border-bottom:.5px solid var(--border)}
.data-table td:first-child{text-align:left}
.data-table tr:last-child td{border-bottom:none}
.data-table tr.today-row td{background:rgba(22,163,74,.06)}

/* Forms */
.notify-form{display:flex;flex-direction:column;gap:10px}
.notify-form input,.notify-form textarea,.notify-form select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;width:100%;resize:none}
.notify-form input:focus,.notify-form textarea:focus,.notify-form select:focus{border-color:var(--blue)}
.notify-form input[type="time"]{color-scheme:dark}
.notify-form textarea{min-height:80px}

/* Buttons */
.btn-send{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.btn-send:active{opacity:.8}
.btn-send:disabled{opacity:.4;cursor:default}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;width:100%}
.btn-secondary:active{opacity:.8}
.refresh-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px}

/* Loading / Empty */
.loading{text-align:center;padding:40px 20px;font-size:13px;color:var(--text3)}
.spinner{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:24px 16px;background:var(--surface2);border-radius:12px;margin:8px 0}
.empty-state p{font-size:13px;color:var(--text3)}

/* Overlay / Sheet */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:flex-end}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:88vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}

/* Risk cards */
.risk-card{border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid}
.risk-card-red{background:#3b121920;border-color:#ef444450}
.risk-card-amber{background:#2a1a0020;border-color:#f59e0b50}
.risk-card-yellow{background:#1a1a0020;border-color:#eab30850}

/* ─── Schedule Card ─────────────────────────────────── */
.sched-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sched-nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 14px;font-size:18px;cursor:pointer;font-family:inherit;line-height:1;transition:background .1s}
.sched-nav-btn:active{background:var(--border)}
.sched-nav-label{font-size:13px;font-weight:600;color:var(--text)}
.sched-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sched-header-btns{display:flex;gap:6px}
.sched-btn-add{font-size:11px;padding:5px 11px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600}
.sched-btn-week{font-size:11px;padding:5px 11px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit}
.sched-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.sched-col{display:flex;flex-direction:column}
.sched-col-hdr{text-align:center;padding:8px 2px 10px;border-bottom:1px solid var(--border);margin-bottom:6px}
.sched-col-hdr-day{font-size:11px;font-weight:600;margin-bottom:6px;color:var(--text3)}
.sched-col-hdr-numwrap{display:flex;align-items:center;justify-content:center;height:40px}
.sched-col-hdr-num{font-size:24px;font-weight:800;line-height:1;color:var(--text)}
.sched-today-circle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#22c55e;color:#fff;font-size:22px;font-weight:800;line-height:1}
.sched-col-hdr.today{background:rgba(34,197,94,.07);border-radius:8px 8px 0 0;border-bottom-color:rgba(34,197,94,.5)}
.sched-col-body{display:flex;flex-direction:column;gap:5px}
.sched-pill{display:flex;align-items:baseline;gap:5px;border-radius:7px;padding:7px 9px;cursor:pointer;border-left:4px solid;transition:opacity .12s;user-select:none}
.sched-pill:active{opacity:.6}
.sched-pill-time{font-size:10px;font-weight:700;flex-shrink:0;opacity:.9;letter-spacing:.2px}
.sched-pill-title{font-size:11px;font-weight:600;word-break:keep-all;line-height:1.4;flex:1}
.sched-add-btn{font-size:18px;text-align:center;color:var(--border);padding:5px 0;cursor:pointer;border-radius:6px;border:1px dashed var(--border);margin-top:2px;transition:all .1s;line-height:1}
.sched-add-btn:active{background:var(--surface2);color:var(--text3)}
.sched-md-tag{font-size:9px;font-weight:700;margin-top:4px;line-height:1;text-align:center}

/* Sub-tabs */
.sub-tabs{display:flex;gap:8px;margin-bottom:12px}
.sub-tab{flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2)}
.sub-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* Chat list */
.chat-list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.chat-list-item:last-child{border-bottom:none}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:14px;font-weight:500}
.chat-preview{font-size:12px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:10px;color:var(--text3)}
.unread-badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}

/* Chat thread overlay */
.chat-thread-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.chat-thread-overlay.open{transform:translateX(0)}
.chat-thread-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--border);background:var(--surface)}
.chat-thread-back{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:0;line-height:1}
.chat-thread-name{font-size:16px;font-weight:600;flex:1}
.chat-thread-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word}
.msg-coach{background:var(--blue);color:#fff;border-radius:16px 16px 4px 16px;align-self:flex-end}
.msg-player{background:var(--surface2);color:var(--text);border-radius:16px 16px 16px 4px;align-self:flex-start}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px}
.msg-read{font-size:10px;color:#4ade80;margin-top:1px;font-weight:600}
.msg-wrap-coach{display:flex;flex-direction:column;align-items:flex-end}
.msg-wrap-player{display:flex;flex-direction:column;align-items:flex-start}
.chat-thread-input{display:flex;gap:8px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));border-top:.5px solid var(--border);background:var(--surface)}
.chat-input-field{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none}
.chat-input-field:focus{border-color:var(--blue)}
.chat-send-btn{background:var(--blue);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1c2a1c;border:1px solid #22c55e60;color:#4ade80;border-radius:12px;padding:10px 20px;font-size:13px;font-weight:500;z-index:400;white-space:nowrap;opacity:0;transition:opacity .2s}
.toast.error{background:#2a1212;border-color:#ef444460;color:#f87171}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div style="font-size:36px;margin-bottom:12px">⚽</div>
  <h1>부산아이파크</h1>
  <p>코치 전용 모바일 앱</p>
  <div class="login-form">
    <input type="email" id="login-email" placeholder="이메일" autocomplete="email">
    <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">로그인</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">⚽ 부산아이파크</div>
        <div class="header-sub" id="header-sub">코치 모바일</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 1. 홈 -->
  <div class="page active" id="page-home">
    <div id="home-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
  </div>

  <!-- 2. 웰니스 -->
  <div class="page" id="page-wellness">
    <div id="wellness-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
  </div>

  <!-- 3. RPE -->
  <div class="page" id="page-rpe">
    <div id="rpe-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
  </div>

  <!-- 4. 훈련 -->
  <div class="page" id="page-training">
    <div id="training-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
  </div>

  <!-- 5. 알림 -->
  <div class="page" id="page-notify">
    <div style="padding:12px 16px 0">
      <div class="sub-tabs">
        <div class="sub-tab active" id="stab-announce" onclick="switchNotifyTab('announce')">📢 공지사항</div>
        <div class="sub-tab" id="stab-chat" onclick="switchNotifyTab('chat')">💬 채팅</div>
      </div>
    </div>
    <!-- 공지사항 -->
    <div id="notify-announce">
      <div class="card">
        <div class="card-title">📢 전체 공지</div>
        <div class="notify-form">
          <input type="text" id="announce-title" placeholder="공지 제목">
          <textarea id="announce-body" placeholder="공지 내용을 입력하세요"></textarea>
          <button class="btn-send" id="announce-btn" onclick="sendAnnouncement()">📢 전체 발송</button>
        </div>
      </div>
    </div>
    <!-- 채팅 목록 -->
    <div id="notify-chat" style="display:none">
      <div class="card">
        <div class="card-title" style="margin-bottom:4px">💬 1:1 채팅 <span style="font-size:11px;font-weight:400;color:var(--text3)">선수를 탭해서 대화</span></div>
        <div id="chat-list-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
      </div>
    </div>
  </div>

  <!-- 바텀 탭 -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home',this)">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">홈</div>
    </div>
    <div class="nav-item" onclick="switchPage('wellness',this)">
      <div class="nav-icon">💚</div>
      <div class="nav-label">웰니스</div>
    </div>
    <div class="nav-item" onclick="switchPage('rpe',this)">
      <div class="nav-icon">💢</div>
      <div class="nav-label">RPE</div>
    </div>
    <div class="nav-item" onclick="switchPage('training',this)">
      <div class="nav-icon">🏃</div>
      <div class="nav-label">훈련</div>
    </div>
    <div class="nav-item" onclick="switchPage('notify',this)">
      <div class="nav-icon">💬</div>
      <div class="nav-label">알림</div>
    </div>
  </nav>
</div>

<!-- 선수 상세 시트 -->
<div class="overlay" id="player-overlay" style="display:none" onclick="closePlayerOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="player-detail-content"></div>
  </div>
</div>

<!-- 일정 추가/수정 시트 -->
<div class="overlay" id="sched-overlay" style="display:none" onclick="closeSchedOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="font-size:15px;font-weight:600;margin-bottom:6px" id="sched-sheet-title">일정 추가</div>
    <div id="sched-date-display" style="font-size:13px;color:var(--blue);font-weight:500;margin-bottom:14px"></div>
    <div class="notify-form">
      <input type="date" id="sched-date-input" style="display:none">
      <input type="time" id="sched-start-time" placeholder="시작 시간 (선택)">
      <input type="text" id="sched-title-input" placeholder="일정 제목 *">
      <select id="sched-event-type">
        <option value="">이벤트 유형 (선택)</option>
        <option>훈련</option>
        <option>경기</option>
        <option>식사</option>
        <option>미팅</option>
        <option>이동</option>
        <option>재활</option>
        <option>체크인</option>
        <option>기타</option>
      </select>
      <select id="sched-md-stage">
        <option value="">MD 단계 (선택)</option>
        <option>MD-5</option><option>MD-4</option><option>MD-3</option>
        <option>MD-2</option><option>MD-1</option><option>MD</option>
        <option>MD+1</option><option>MD+2</option>
      </select>
      <button class="btn-send" id="sched-save-btn" onclick="saveSchedEvent()">저장</button>
      <button class="btn-secondary" id="sched-delete-btn" style="display:none;background:#3b121933;border-color:#ef444440;color:#f87171" onclick="deleteSchedEvent()">🗑 삭제</button>
    </div>
  </div>
</div>

<!-- 주간 입력 시트 -->
<div class="overlay" id="week-input-overlay" style="display:none" onclick="closeWeekInput(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="font-size:15px;font-weight:600;margin-bottom:4px">주간 일정 입력</div>
    <div id="week-input-label" style="font-size:12px;color:var(--text3);margin-bottom:14px"></div>
    <div id="week-input-content"><div class="loading"><span class="spinner">⏳</span></div></div>
  </div>
</div>

<!-- 채팅 스레드 -->
<div class="chat-thread-overlay" id="chat-thread-overlay">
  <div class="chat-thread-header">
    <button class="chat-thread-back" onclick="closeChatThread()">←</button>
    <div class="chat-thread-name" id="chat-thread-name"></div>
    <div id="chat-thread-pos" style="font-size:11px;color:var(--text3)"></div>
  </div>
  <div class="chat-thread-messages" id="chat-thread-messages"></div>
  <div class="chat-thread-input">
    <input class="chat-input-field" id="chat-input" placeholder="메시지 입력..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}">
    <button class="chat-send-btn" onclick="sendChatMsg()">↑</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://gmrhkbddhzpfqzkhuvgf.supabase.co';
const SUPA_KEY = 'sb_publishable_sj1Pro0Pwv3i-RzQdHsEPw_WLJUsa9V';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let _players = [];
let _loadedPages = {};
let _currentChatPlayerId = null;
let _chatSub = null;
let _schedDayOffset = 0;
let _schedEditId = null;
let _schedEditDate = null;
let _schedTouchX = 0;

const DOW = ['일','월','화','수','목','금','토'];
const MD_COLORS = {'MD-5':'#60a5fa','MD-4':'#34d399','MD-3':'#fbbf24','MD-2':'#f87171','MD-1':'#e879f9','MD':'#4ade80','MD+1':'#94a3b8','MD+2':'#94a3b8'};
// 웹앱(index.html)과 동일한 색상 + 동일한 영문 키 사용
const EVENT_TYPE_COLORS = {
  'TRAINING':{bg:'rgba(22,163,74,0.20)',   border:'#16a34a', text:'#4ade80'},
  'MATCH':   {bg:'rgba(239,68,68,0.20)',   border:'#ef4444', text:'#fca5a5'},
  'GYM':     {bg:'rgba(59,130,246,0.20)',  border:'#3b82f6', text:'#93c5fd'},
  'MEAL':    {bg:'rgba(234,179,8,0.20)',   border:'#eab308', text:'#fde047'},
  'SNACK':   {bg:'rgba(249,115,22,0.20)',  border:'#f97316', text:'#fdba74'},
  'EVENT':   {bg:'rgba(139,92,246,0.20)',  border:'#8b5cf6', text:'#c4b5fd'},
  'REST':    {bg:'rgba(113,113,122,0.20)', border:'#71717a', text:'#a1a1aa'},
  'DEFAULT': {bg:'rgba(100,116,139,0.15)', border:'#64748b', text:'#cbd5e1'},
};

function kst(d){ const dt=d?new Date(d):new Date(); return new Date(dt.getTime()+9*3600000); }
function getKSTDateStr(d){ return kst(d).toISOString().split('T')[0]; }
function showToast(msg,isError=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(isError?' error':'')+' show';
  setTimeout(()=>t.className='toast'+(isError?' error':''),2500);
}

// ── Auth ──────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!email||!pw){errEl.textContent='이메일과 비밀번호를 입력하세요';return;}
  const {data,error}=await supa.auth.signInWithPassword({email,password:pw});
  if(error){errEl.textContent='로그인 실패: '+error.message;return;}
  currentUser=data.user; initApp();
}
async function doLogout(){
  if(_chatSub) supa.removeChannel(_chatSub);
  await supa.auth.signOut();
  currentUser=null; _players=[]; _loadedPages={};
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
supa.auth.onAuthStateChange((event,session)=>{
  if(session?.user&&!currentUser){currentUser=session.user;initApp();}
});
async function initApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('header-sub').textContent=currentUser.email;
  const {data}=await supa.from('player_profiles').select('*').order('name');
  _players=data||[];
  loadHome();
}

// ── 탭 전환 ──────────────────────────────────────────
function switchPage(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
  if(!_loadedPages[page]){
    _loadedPages[page]=true;
    if(page==='wellness') loadWellness();
    if(page==='rpe') loadRpe();
    if(page==='training') loadTraining();
    if(page==='notify') loadChatList();
  }
}

// 1. 홈 — 팀일정 / 부상자 현황 / 관리 우선순위
// ══════════════════════════════════════════════════════
async function loadHome(){
  const el=document.getElementById('home-content');
  el.innerHTML='<div class="loading"><span class="spinner">⏳</span> 로딩 중...</div>';

  const today=getKSTDateStr();
  const now=kst();
  const since28=new Date(now); since28.setDate(now.getDate()-28);
  const since28Str=since28.toISOString().split('T')[0];
  const since7=new Date(now); since7.setDate(now.getDate()-7);
  const since7Str=since7.toISOString().split('T')[0];

  const [{data:injuries},{data:todayWell},{data:well7},{data:rpe28},{data:gps28}]=await Promise.all([
    supa.from('injury_records').select('player_id,body_part,injury_type,status,return_date,injury_date')
      .in('status',['치료중','재활중','부분 참여']).order('injury_date',{ascending:false}),
    supa.from('wellness_records').select('player_id,fatigue,sleep_quality,stress,muscle_soreness').eq('record_date',today),
    supa.from('wellness_records').select('player_id,record_date,fatigue,sleep_quality,stress,muscle_soreness')
      .gte('record_date',since7Str).order('record_date',{ascending:false}),
    supa.from('session_records').select('player_id,record_date,rpe,duration').gte('record_date',since28Str),
    supa.from('gps_records').select('player_id,session_date,max_speed,duration,session_type2').gte('session_date',since28Str),
  ]);

  // 부상자
  const injHtml=(injuries||[]).length
    ?(injuries||[]).map(inj=>{
        const p=_players.find(pl=>pl.id===inj.player_id);
        const sc=inj.status==='치료중'?{bg:'#7f1d1d',text:'#fca5a5'}
          :inj.status==='재활중'?{bg:'#312e81',text:'#a5b4fc'}:{bg:'#134e4a',text:'#5eead4'};
        const days=inj.injury_date?Math.floor((new Date()-new Date(inj.injury_date))/86400000):null;
        return '<div class="player-row">'
          +'<div><div class="player-name">'+(p?.name||'—')+'</div>'
          +'<div class="player-pos">'+(p?.position||'—')+' · '+(inj.body_part||'—')+(inj.return_date?' · 복귀 예정 '+inj.return_date:'')+'</div></div>'
          +'<div style="text-align:right"><span style="font-size:10px;padding:2px 8px;border-radius:6px;background:'+sc.bg+';color:'+sc.text+';font-weight:600">'+inj.status+'</span>'
          +(days!==null?'<div style="font-size:10px;color:var(--text3);margin-top:3px">'+days+'일째</div>':'')+'</div></div>';
      }).join('')
    :'<div class="empty-state"><p>✅ 부상 선수 없음</p></div>';

  // 관리 우선순위
  const injuredIds=new Set((injuries||[]).map(r=>r.player_id));
  const rpeMap={};
  (rpe28||[]).forEach(r=>{if(!rpeMap[r.player_id])rpeMap[r.player_id]=[];rpeMap[r.player_id].push({date:r.record_date,rpe:parseFloat(r.rpe)||0,dur:parseFloat(r.duration)||0});});
  const todayWMap={};(todayWell||[]).forEach(r=>{todayWMap[r.player_id]=r;});
  const paList=[];
  for(const pl of _players){
    if(injuredIds.has(pl.id)) continue;
    const acwrData=calcACWR(rpeMap[pl.id]||[],today);
    const pgps=(gps28||[]).filter(r=>r.player_id===pl.id);
    const mss=parseFloat(pl.mss)||0;
    const mvExp=mss>0?calcMVExposure(pgps.map(r=>({date:r.session_date,maxSpeed:parseFloat(r.max_speed)||0})),mss,today):null;
    const p7w=(well7||[]).filter(r=>r.player_id===pl.id);
    const tw=todayWMap[pl.id]||null;
    const wellData=(tw&&p7w.length>1)?calcWellnessRisk(p7w.slice(1),tw):null;
    const risk=calcRiskLevel(acwrData.acwr,mvExp,wellData);
    let score=0;const flags=[];
    if(risk.level==='red'){score+=35;risk.flags.forEach(f=>flags.push(f.msg));}
    else if(risk.level==='amber'){score+=20;risk.flags.forEach(f=>flags.push(f.msg));}
    else if(risk.level==='yellow'){score+=10;risk.flags.forEach(f=>flags.push(f.msg));}
    if(!tw){score+=5;flags.push('웰니스 미응답');}
    else{const wt=(tw.fatigue||0)+(tw.sleep_quality||0)+(tw.stress||0)+(tw.muscle_soreness||0);
      if(wt<8){score+=20;flags.push('웰니스 위험 '+wt+'/20');}
      else if(wt<12){score+=10;flags.push('웰니스 주의 '+wt+'/20');}}
    if(score>0) paList.push({player:pl,score,flags:[...new Set(flags)],riskLevel:risk.level,acwr:acwrData.acwr});
  }
  paList.sort((a,b)=>b.score-a.score);
  const levelCfg={red:{bg:'#3b121920',border:'#ef4444',color:'#f87171',label:'🔴 고위험'},amber:{bg:'#2a1a0020',border:'#f59e0b',color:'#fbbf24',label:'🟠 주의'},yellow:{bg:'#1a1a0020',border:'#eab308',color:'#fde047',label:'🟡 모니터링'}};
  const priorityHtml=paList.slice(0,5).length
    ?paList.slice(0,5).map((item,idx)=>{
        const cfg=levelCfg[item.riskLevel]||levelCfg.yellow;
        return '<div class="risk-card risk-card-'+item.riskLevel+'" onclick="showPlayerDetail(\''+item.player.id+'\')">'
          +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
          +'<div><span style="font-size:10px;color:'+cfg.color+';font-weight:600">'+(idx+1)+'</span>'
          +' <span style="font-size:14px;font-weight:600">'+item.player.name+'</span>'
          +' <span style="font-size:11px;color:var(--text3)">'+(item.player.position||'—')+'</span></div>'
          +'<span class="badge badge-'+(item.riskLevel==='red'?'red':item.riskLevel==='amber'?'amber':'yellow')+'">'+cfg.label+'</span></div>'
          +(item.flags.length?'<div style="font-size:11px;color:'+cfg.color+';margin-top:5px">'+item.flags.slice(0,2).map(f=>'• '+f).join('<br>')+'</div>':'')
          +(item.acwr?'<div style="font-size:10px;color:var(--text3);margin-top:3px">ACWR '+item.acwr.toFixed(2)+'</div>':'')
          +'</div>';
      }).join('')
    :'<div class="empty-state"><div style="font-size:24px;margin-bottom:6px">🟢</div><p>전 선수 정상</p></div>';

  el.innerHTML=
    '<div style="padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:center">'
    +'<div style="font-size:13px;color:var(--text3)">'+today+' ('+DOW[new Date(today+'T12:00:00').getDay()]+')</div>'
    +'<button class="refresh-btn" onclick="_schedDayOffset=0;_loadedPages[\'home\']=false;loadHome()">🔄</button></div>'

    +'<div class="card" id="sched-card"><div class="loading" style="padding:16px 0"><span class="spinner">⏳</span></div></div>'

    +'<div class="card"><div class="card-title">🏥 부상자 현황 <span style="font-size:11px;font-weight:400;color:var(--text3)">'+(injuries||[]).length+'명</span></div>'
    +injHtml+'</div>'

    +'<div class="card"><div class="card-title">🎯 오늘 관리 우선순위 <span style="font-size:11px;font-weight:400;color:var(--text3)">'+paList.length+'명 중 상위</span></div>'
    +priorityHtml+'</div>';

  loadScheduleCard();
}

// ══════════════════════════════════════════════════════
// 일정 카드 — 3일 뷰 + 컬러 이벤트 + 수정 + 주간입력
// ══════════════════════════════════════════════════════
function getDayWindowBounds(offset){
  const now=kst();
  const base=new Date(now);
  base.setHours(0,0,0,0);
  base.setDate(now.getDate()+(offset||0));
  const days=[];
  for(let i=0;i<2;i++){
    const d=new Date(base); d.setDate(base.getDate()+i);
    days.push(d.toISOString().split('T')[0]);
  }
  return {days, start:days[0], end:days[1]};
}

async function loadScheduleCard(){
  const el=document.getElementById('sched-card');
  if(!el) return;
  el.innerHTML='<div class="loading" style="padding:16px 0"><span class="spinner">⏳</span></div>';

  const {days,start,end}=getDayWindowBounds(_schedDayOffset);
  const today=getKSTDateStr();
  const {data:weekSched}=await supa.from('weekly_schedule')
    .select('id,event_date,event_type,md_stage,title,start_time')
    .gte('event_date',start).lte('event_date',end)
    .order('event_date').order('start_time',{nullsFirst:false});

  const schedByDate={};
  (weekSched||[]).forEach(e=>{
    if(!schedByDate[e.event_date]) schedByDate[e.event_date]=[];
    schedByDate[e.event_date].push(e);
  });

  const fmtDay=ds=>{const d=new Date(ds+'T12:00:00');return(d.getMonth()+1)+'/'+d.getDate()+'('+DOW[d.getDay()]+')';}
  const winLabel=fmtDay(start)+' ~ '+fmtDay(end);

  const gridHtml=days.map(ds=>{
    const d=new Date(ds+'T12:00:00');
    const isT=ds===today;
    const dw=d.getDay();
    const dc=dw===0?'#f87171':dw===6?'#93c5fd':'var(--text2)';
    const evts=schedByDate[ds]||[];
    const md=evts.find(e=>e.md_stage)?.md_stage||'';
    const mdColor=md?(MD_COLORS[md]||'#888'):'';

    const pills=evts.map(e=>{
      const type=guessEventType(e.title,e.event_type);
      const c=EVENT_TYPE_COLORS[type]||EVENT_TYPE_COLORS['DEFAULT'];
      const timeSpan=e.start_time?'<span class="sched-pill-time">'+e.start_time.slice(0,5)+'</span>':'';
      return '<div class="sched-pill" style="background:'+c.bg+';border-left-color:'+c.border+';color:'+c.text
        +'" onclick="openSchedEdit(\''+e.id+'\')">'
        +timeSpan+'<span class="sched-pill-title">'+escHtml(e.title||e.event_type||'')+'</span></div>';
    }).join('');

    const numHtml='<div class="sched-col-hdr-numwrap">'
      +(isT
        ?'<div class="sched-today-circle">'+d.getDate()+'</div>'
        :'<div class="sched-col-hdr-num" style="color:'+dc+'">'+d.getDate()+'</div>')
      +'</div>';

    return '<div class="sched-col">'
      +'<div class="sched-col-hdr'+(isT?' today':'')+'">'
      +'<div class="sched-col-hdr-day" style="color:'+dc+'">'+DOW[dw]+'</div>'
      +numHtml
      +(md?'<div class="sched-md-tag" style="color:'+mdColor+'">'+md+'</div>':'')
      +'</div>'
      +'<div class="sched-col-body">'+pills
      +'<div class="sched-add-btn" onclick="openSchedAdd(\''+ds+'\')">+</div>'
      +'</div></div>';
  }).join('');

  el.innerHTML=
    '<div class="sched-header-row">'
    +'<div class="card-title" style="margin-bottom:0">📅 팀 일정</div>'
    +'<div class="sched-header-btns">'
    +'<button class="sched-btn-add" onclick="openSchedAdd()">+ 추가</button>'
    +'<button class="sched-btn-week" onclick="openWeekInput()">주간 입력</button>'
    +'</div></div>'
    +'<div class="sched-nav">'
    +'<button class="sched-nav-btn" onclick="changeSchedWindow(-1)">‹</button>'
    +'<div class="sched-nav-label" style="font-size:12px">'+winLabel+'</div>'
    +'<button class="sched-nav-btn" onclick="changeSchedWindow(1)">›</button>'
    +'</div>'
    +'<div class="sched-grid" id="sched-grid">'+gridHtml+'</div>';

  initSchedSwipe();
}

function changeSchedWindow(delta){
  _schedDayOffset+=delta;
  loadScheduleCard();
}

function guessEventType(title, eventType){
  // DB 값이 영문이면 그대로 사용 (웹앱과 동일한 키)
  if(eventType&&eventType.trim()){
    const up=eventType.trim().toUpperCase();
    if(EVENT_TYPE_COLORS[up]) return up;
  }
  // event_type 없으면 제목 키워드로 감지
  const t=(title||'').replace(/\s/g,'').toUpperCase();
  if(/GYM|웨이트|근력/.test(t)) return 'GYM';
  if(/훈련|TRAINING|전술/.test(t)) return 'TRAINING';
  if(/경기|MATCH/.test(t)) return 'MATCH';
  if(/조식|중식|석식|식사|단체식|MEAL/.test(t)) return 'MEAL';
  if(/간식|SNACK/.test(t)) return 'SNACK';
  if(/미팅|회의|이벤트|EVENT|자산관리/.test(t)) return 'EVENT';
  if(/휴식|REST|자유/.test(t)) return 'REST';
  return 'DEFAULT';
}

function initSchedSwipe(){
  const el=document.getElementById('sched-grid');
  if(!el) return;
  el.addEventListener('touchstart',e=>{_schedTouchX=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_schedTouchX;
    if(Math.abs(dx)>60) changeSchedWindow(dx>0?-1:1);
  },{passive:true});
}

function openSchedAdd(dateStr){
  _schedEditId=null;
  _schedEditDate=dateStr||null;
  const dateInputEl=document.getElementById('sched-date-input');
  document.getElementById('sched-sheet-title').textContent='일정 추가';
  if(dateStr){
    const d=new Date(dateStr+'T12:00:00');
    document.getElementById('sched-date-display').textContent=dateStr+' ('+DOW[d.getDay()]+')';
    dateInputEl.style.display='none';
  } else {
    document.getElementById('sched-date-display').textContent='';
    dateInputEl.value=getKSTDateStr();
    dateInputEl.style.display='block';
  }
  document.getElementById('sched-start-time').value='';
  document.getElementById('sched-title-input').value='';
  document.getElementById('sched-event-type').value='';
  document.getElementById('sched-md-stage').value='';
  document.getElementById('sched-delete-btn').style.display='none';
  document.getElementById('sched-overlay').style.display='flex';
}

async function openSchedEdit(id){
  _schedEditId=id;
  const {data}=await supa.from('weekly_schedule').select('*').eq('id',id).single();
  if(!data) return;
  _schedEditDate=data.event_date;
  const d=new Date(data.event_date+'T12:00:00');
  document.getElementById('sched-sheet-title').textContent='일정 수정';
  document.getElementById('sched-date-display').textContent=data.event_date+' ('+DOW[d.getDay()]+')';
  document.getElementById('sched-start-time').value=data.start_time?data.start_time.slice(0,5):'';
  document.getElementById('sched-title-input').value=data.title||'';
  document.getElementById('sched-event-type').value=data.event_type||'';
  document.getElementById('sched-md-stage').value=data.md_stage||'';
  document.getElementById('sched-delete-btn').style.display='block';
  document.getElementById('sched-overlay').style.display='flex';
}

async function saveSchedEvent(){
  let eventDate=_schedEditDate;
  if(!eventDate){
    eventDate=document.getElementById('sched-date-input').value;
    if(!eventDate){showToast('날짜를 선택하세요',true);return;}
  }
  const title=document.getElementById('sched-title-input').value.trim();
  const start_time=document.getElementById('sched-start-time').value||null;
  const event_type=document.getElementById('sched-event-type').value||null;
  const md_stage=document.getElementById('sched-md-stage').value||null;
  if(!title){showToast('제목을 입력하세요',true);return;}
  const btn=document.getElementById('sched-save-btn');
  btn.disabled=true;btn.textContent='저장 중...';
  try{
    if(_schedEditId){
      const {error}=await supa.from('weekly_schedule').update({title,start_time,event_type,md_stage}).eq('id',_schedEditId);
      if(error) throw error;
    } else {
      const {error}=await supa.from('weekly_schedule').insert({event_date:eventDate,title,start_time,event_type,md_stage});
      if(error) throw error;
    }
    closeSchedOverlay();
    loadScheduleCard();
    if(document.getElementById('week-input-overlay').style.display!=='none') loadWeekInputContent();
    showToast('✅ 저장됨');
  }catch(e){showToast('저장 실패: '+e.message,true);}
  finally{btn.disabled=false;btn.textContent='저장';}
}

async function deleteSchedEvent(){
  if(!_schedEditId) return;
  if(!confirm('이 일정을 삭제할까요?')) return;
  try{
    const {error}=await supa.from('weekly_schedule').delete().eq('id',_schedEditId);
    if(error) throw error;
    closeSchedOverlay();
    loadScheduleCard();
    if(document.getElementById('week-input-overlay').style.display!=='none') loadWeekInputContent();
    showToast('✅ 삭제됨');
  }catch(e){showToast('삭제 실패: '+e.message,true);}
}

function closeSchedOverlay(e){
  if(!e||e.target===document.getElementById('sched-overlay'))
    document.getElementById('sched-overlay').style.display='none';
}

// ── 주간 입력 ─────────────────────────────────────────
async function openWeekInput(){
  document.getElementById('week-input-overlay').style.display='flex';
  await loadWeekInputContent();
}

async function loadWeekInputContent(){
  const el=document.getElementById('week-input-content');
  el.innerHTML='<div class="loading" style="padding:20px 0"><span class="spinner">⏳</span></div>';
  const now=kst();
  const dow=now.getDay();
  const wStart=new Date(now);
  wStart.setHours(0,0,0,0);
  wStart.setDate(now.getDate()-(dow===0?6:dow-1));
  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(wStart); d.setDate(wStart.getDate()+i);
    return d.toISOString().split('T')[0];
  });
  const today=getKSTDateStr();
  document.getElementById('week-input-label').textContent=
    (days[0].slice(5).replace('-','/'))+' ~ '+(days[6].slice(5).replace('-','/'));
  const {data:weekSched}=await supa.from('weekly_schedule')
    .select('id,event_date,event_type,md_stage,title,start_time')
    .gte('event_date',days[0]).lte('event_date',days[6])
    .order('event_date').order('start_time',{nullsFirst:false});
  const schedByDate={};
  (weekSched||[]).forEach(e=>{
    if(!schedByDate[e.event_date]) schedByDate[e.event_date]=[];
    schedByDate[e.event_date].push(e);
  });
  el.innerHTML=days.map(ds=>{
    const d=new Date(ds+'T12:00:00');
    const isT=ds===today;
    const dw=d.getDay();
    const dc=dw===0?'#f87171':dw===6?'#93c5fd':'var(--text2)';
    const evts=schedByDate[ds]||[];
    const chips=evts.map(e=>{

async function loadRpe(){
  const el=document.getElementById('rpe-content');
  el.innerHTML='<div class="loading"><span class="spinner">⏳</span> 로딩 중...</div>';
  const today=getKSTDateStr();
  const {data:todayRpe}=await supa.from('session_records').select('player_id,rpe,duration,created_at').eq('record_date',today);
  const rpeMap={};(todayRpe||[]).forEach(r=>{rpeMap[r.player_id]=r;});
  const responded=_players.filter(p=>rpeMap[p.id]&&parseFloat(rpeMap[p.id].rpe)>0)
    .sort((a,b)=>parseFloat(rpeMap[b.id].rpe)-parseFloat(rpeMap[a.id].rpe));
  const noResp=_players.filter(p=>!rpeMap[p.id]||!parseFloat(rpeMap[p.id].rpe));
  const rpeColor=v=>!v?'var(--text3)':v>=8?'#ef4444':v>=6?'#f97316':v>=4?'#eab308':'#22c55e';
  const avgRpe=responded.length?responded.reduce((a,p)=>a+parseFloat(rpeMap[p.id].rpe),0)/responded.length:null;
  const avgDur=responded.length?responded.reduce((a,p)=>a+(parseFloat(rpeMap[p.id].duration)||0),0)/responded.length:null;
  const avgSRPE=avgRpe&&avgDur?Math.round(avgRpe*avgDur):null;
  const tableRows=responded.map(p=>{
    const r=rpeMap[p.id];
    const rv=parseFloat(r.rpe),dur=parseFloat(r.duration)||0;
    const sRPE=rv&&dur?Math.round(rv*dur):null;
    return '<tr><td><div style="font-size:12px;font-weight:500">'+p.name+'</div><div style="font-size:10px;color:var(--text3)">'+(p.position||'—')+'</div></td>'
      +'<td><span style="font-size:16px;font-weight:700;color:'+rpeColor(rv)+'">'+rv+'</span></td>'
      +'<td style="color:var(--text2)">'+(dur?Math.round(dur)+'min':'—')+'</td>'
      +'<td style="color:#a78bfa;font-weight:500">'+(sRPE||'—')+'</td></tr>';
  }).join('');

  el.innerHTML=
    '<div style="padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:center">'
    +'<div style="font-size:13px;color:var(--text3)">'+today+' RPE ('+responded.length+'/'+_players.length+'명)</div>'
    +'<button class="refresh-btn" onclick="_loadedPages[\'rpe\']=false;loadRpe()">🔄</button></div>'

    +(responded.length?'<div class="card"><div class="card-title">📊 팀 평균</div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
      +'<div style="background:var(--surface2);border-radius:12px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">평균 RPE</div><div style="font-size:20px;font-weight:700;color:'+rpeColor(avgRpe)+'">'+(avgRpe?avgRpe.toFixed(1):'—')+'</div></div>'
      +'<div style="background:var(--surface2);border-radius:12px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">평균 시간</div><div style="font-size:20px;font-weight:700;color:var(--text)">'+(avgDur?Math.round(avgDur):'—')+'<span style="font-size:11px;color:var(--text3)">min</span></div></div>'
      +'<div style="background:var(--surface2);border-radius:12px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">평균 sRPE</div><div style="font-size:20px;font-weight:700;color:#a78bfa">'+(avgSRPE||'—')+'</div></div>'
      +'</div></div>':'')

    +'<div class="card" style="padding:12px 0"><div class="card-title" style="padding:0 16px 8px">✅ 응답 완료 <span style="font-size:11px;font-weight:400;color:var(--text3)">'+responded.length+'명</span></div>'
    +(responded.length
      ?'<div style="overflow-x:auto;padding:0 16px"><table class="data-table"><thead><tr><th>선수</th><th>RPE</th><th>시간</th><th>sRPE</th></tr></thead><tbody>'+tableRows+'</tbody></table></div>'
      :'<div style="padding:0 16px"><div class="empty-state"><p>오늘 RPE 입력 없음</p></div></div>')
    +'</div>'

    +(noResp.length?'<div class="card"><div class="card-title">❌ 미응답 <span style="font-size:11px;font-weight:400;color:var(--text3)">'+noResp.length+'명</span></div>'
      +noResp.map(p=>'<div class="player-row"><div><div class="player-name">'+p.name+'</div><div class="player-pos">'+(p.position||'—')+'</div></div>'
        +'<button onclick="sendRpeReminder(\''+p.id+'\',\''+p.name+'\')" style="font-size:11px;padding:5px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap">📨 알림</button></div>').join('')

// 4. 훈련 — 2주 팀 부하 흐름
// ══════════════════════════════════════════════════════
async function loadTraining(){
  const el=document.getElementById('training-content');
  el.innerHTML='<div class="loading"><span class="spinner">⏳</span> 로딩 중...</div>';
  const today=getKSTDateStr();
  const now=kst();
  const since14=new Date(now); since14.setDate(now.getDate()-13);
  const since28=new Date(now); since28.setDate(now.getDate()-28);
  const since14Str=since14.toISOString().split('T')[0];
  const since28Str=since28.toISOString().split('T')[0];
  const [{data:gps14},{data:rpe28}]=await Promise.all([
    supa.from('gps_records').select('session_date,player_id,td,running_high,sprint,duration,session_type2,session_topic')
      .gte('session_date',since14Str).lte('session_date',today).order('session_date',{ascending:true}),
    supa.from('session_records').select('player_id,record_date,rpe,duration').gte('record_date',since28Str),
  ]);

  const plRpe={};
  (rpe28||[]).forEach(r=>{if(!plRpe[r.player_id])plRpe[r.player_id]=[];plRpe[r.player_id].push({date:r.record_date,rpe:parseFloat(r.rpe)||0,dur:parseFloat(r.duration)||0});});

  const calcTeamACWR=targetDate=>{
    const acwrs=Object.values(plRpe).map(sess=>calcACWR(sess,targetDate).acwr).filter(v=>v!==null);
    return acwrs.length?acwrs.reduce((a,b)=>a+b,0)/acwrs.length:null;
  };
  const acwrColor=v=>!v?'var(--text3)':v>1.5?'#ef4444':v>1.3?'#f59e0b':v<0.8?'#eab308':'#22c55e';

  const days=[];
  for(let i=13;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);days.push(d.toISOString().split('T')[0]);}

  let tTD=0,tHSR=0,tSprint=0,tSRPE=0;
  const rows=days.map(ds=>{
    const d=new Date(ds+'T12:00:00');
    const isT=ds===today;
    const dc=d.getDay()===0?'#f87171':d.getDay()===6?'#93c5fd':'var(--text2)';
    const dayGps=(gps14||[]).filter(r=>r.session_date===ds);
    const mGps=dayGps.filter(r=>(r.session_type2||'').trim().toUpperCase()==='M');
    const useGps=mGps.length?mGps:dayGps;
    if(!useGps.length){
      return '<tr'+(isT?' class="today-row"':'')+'>'
        +'<td><span style="color:'+dc+'">'+DOW[d.getDay()]+' '+d.getDate()+'</span>'+(isT?' <span style="font-size:9px;color:#4ade80">오늘</span>':'')+'</td>'
        +'<td colspan="5" style="color:var(--text3);font-style:italic;text-align:center">—</td></tr>';
    }
    const sumDur=useGps.reduce((a,r)=>a+(parseFloat(r.duration)||0),0);
    const maxDur=Math.max(...useGps.map(r=>parseFloat(r.duration)||0));
    const wavg=f=>sumDur>0?useGps.reduce((a,r)=>a+(parseFloat(r[f])||0),0)/sumDur*maxDur:null;
    const tdV=wavg('td'),hsrV=wavg('running_high'),sprintV=wavg('sprint');
    const dayRpe=(rpe28||[]).filter(r=>r.record_date===ds&&parseFloat(r.rpe)>0);
    const rpeAvg=dayRpe.length?dayRpe.reduce((a,r)=>a+parseFloat(r.rpe),0)/dayRpe.length:null;
    const durAvg=dayRpe.length?dayRpe.reduce((a,r)=>a+parseFloat(r.duration),0)/dayRpe.length:null;
    const sRPE=rpeAvg&&durAvg?Math.round(rpeAvg*durAvg):null;
    const teamACWR=calcTeamACWR(ds);
    const topic=useGps[0]?.session_topic||'';
    if(tdV){tTD+=tdV;}
    if(hsrV) tHSR+=hsrV;
    if(sprintV) tSprint+=sprintV;
    if(sRPE) tSRPE+=sRPE;
    return '<tr'+(isT?' class="today-row"':'')+'>'
      +'<td><span style="color:'+dc+'">'+DOW[d.getDay()]+' '+d.getDate()+'</span>'+(isT?' <span style="font-size:9px;color:#4ade80">오늘</span>':'')+(topic?'<div style="font-size:9px;color:var(--text3)">'+topic+'</div>':'')+'</td>'
      +'<td style="color:#60a5fa">'+(tdV?tdV.toFixed(1):'—')+'</td>'
      +'<td style="color:#f59e0b">'+(hsrV?Math.round(hsrV):'—')+'</td>'
      +'<td style="color:#ef4444">'+(sprintV?Math.round(sprintV):'—')+'</td>'
      +'<td style="color:#a78bfa">'+(sRPE||'—')+'</td>'
      +'<td style="color:'+acwrColor(teamACWR)+';font-weight:500">'+(teamACWR?teamACWR.toFixed(2):'—')+'</td>'
      +'</tr>';
  }).join('');

  el.innerHTML=
    '<div style="padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:center">'
    +'<div style="font-size:13px;color:var(--text3)">최근 2주 팀 부하 흐름</div>'
    +'<button class="refresh-btn" onclick="_loadedPages[\'training\']=false;loadTraining()">🔄</button></div>'

    +'<div class="card"><div class="card-title">📊 2주 합계</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">'
    +'<div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:10px;color:var(--text3)">TD</div><div style="font-size:14px;font-weight:600;color:#60a5fa">'+tTD.toFixed(1)+'<span style="font-size:9px;color:var(--text3)">km</span></div></div>'
    +'<div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:10px;color:var(--text3)">HSR</div><div style="font-size:14px;font-weight:600;color:#f59e0b">'+Math.round(tHSR).toLocaleString()+'<span style="font-size:9px;color:var(--text3)">m</span></div></div>'
    +'<div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:10px;color:var(--text3)">Sprint</div><div style="font-size:14px;font-weight:600;color:#ef4444">'+Math.round(tSprint).toLocaleString()+'<span style="font-size:9px;color:var(--text3)">m</span></div></div>'
    +'<div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:10px;color:var(--text3)">sRPE</div><div style="font-size:14px;font-weight:600;color:#a78bfa">'+Math.round(tSRPE).toLocaleString()+'</div></div>'
    +'</div></div>'

    +'<div class="card" style="padding:12px 0"><div style="overflow-x:auto;padding:0 8px">'
    +'<table class="data-table"><thead><tr>'
    +'<th>날짜</th>'
    +'<th style="color:#60a5fa">TD<br><span style="font-size:9px">(km)</span></th>'
    +'<th style="color:#f59e0b">HSR<br><span style="font-size:9px">(m)</span></th>'
    +'<th style="color:#ef4444">Sprint<br><span style="font-size:9px">(m)</span></th>'
    +'<th style="color:#a78bfa">sRPE</th>'
    +'<th>ACWR</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

    document.getElementById('announce-body').value='';
  }catch(e){showToast('발송 실패: '+e.message,true);}
  finally{btn.disabled=false;btn.textContent='📢 전체 발송';}
}

async function loadChatList(){
  const el=document.getElementById('chat-list-content');
  el.innerHTML='<div class="loading"><span class="spinner">⏳</span></div>';
  let msgs=[];
  try{
    const {data}=await supa.from('messages').select('player_id,sender,content,created_at,is_read').order('created_at',{ascending:false});
    msgs=data||[];
  }catch(e){
    el.innerHTML='<div style="font-size:12px;color:var(--text3);text-align:center;padding:20px">채팅 기능을 사용하려면 messages 테이블을 먼저 생성해주세요</div>';
    return;
  }
  const lastMsg={},unread={};
  msgs.forEach(m=>{
    if(!lastMsg[m.player_id]) lastMsg[m.player_id]=m;
    if(m.sender==='player'&&!m.is_read) unread[m.player_id]=(unread[m.player_id]||0)+1;
  });
  const withMsg=_players.filter(p=>lastMsg[p.id]).sort((a,b)=>new Date(lastMsg[b.id].created_at)-new Date(lastMsg[a.id].created_at));
  const noMsg=_players.filter(p=>!lastMsg[p.id]);
  const sorted=[...withMsg,...noMsg];
  const tStr=iso=>{const d=new Date(iso);return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(/\. /g,'.').replace(/\.$/, '');};
  el.innerHTML=sorted.map(p=>{
    const last=lastMsg[p.id];const uc=unread[p.id]||0;
    return '<div class="chat-list-item" onclick="openChatThread(\''+p.id+'\',\''+p.name+'\',\''+( p.position||'')+'\')">'
      +'<div class="chat-avatar">'+p.name.slice(0,1)+'</div>'
      +'<div class="chat-info"><div class="chat-name">'+p.name+' <span style="font-size:10px;color:var(--text3)">'+(p.position||'')+'</span></div>'
      +'<div class="chat-preview">'+(last?(last.sender==='coach'?'나: ':'')+last.content:'대화 없음')+'</div></div>'
      +'<div class="chat-meta">'+(last?'<span class="chat-time">'+tStr(last.created_at)+'</span>':'')
      +(uc?'<span class="unread-badge">'+uc+'</span>':'')+'</div></div>';
  }).join('');
}

async function openChatThread(playerId,playerName,playerPos){
  _currentChatPlayerId=playerId;
  document.getElementById('chat-thread-name').textContent=playerName;
  document.getElementById('chat-thread-pos').textContent=playerPos||'';
  document.getElementById('chat-thread-overlay').classList.add('open');
  document.getElementById('chat-input').focus();
  await loadChatMessages(playerId);
  supa.from('messages').update({is_read:true}).eq('player_id',playerId).eq('sender','player').eq('is_read',false).then(()=>{});
  if(_chatSub) supa.removeChannel(_chatSub);
  _chatSub=supa.channel('chat-'+playerId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'player_id=eq.'+playerId},()=>loadChatMessages(playerId))
    .subscribe();
}

async function loadChatMessages(playerId){
  const el=document.getElementById('chat-thread-messages');
  const {data:msgs}=await supa.from('messages').select('*').eq('player_id',playerId).order('created_at',{ascending:true});
  if(!msgs||!msgs.length){
    el.innerHTML='<div style="text-align:center;color:var(--text3);font-size:13px;margin-top:60px">아직 대화가 없어요<br><span style="font-size:11px">메시지를 먼저 보내보세요</span></div>';
    return;
  }
  const tStr=iso=>{const d=new Date(iso);return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(/\. /g,'.').replace(/\.$/, '');};
  el.innerHTML=msgs.map(m=>{
    const isC=m.sender==='coach';
    return '<div class="msg-wrap-'+(isC?'coach':'player')+'">'
      +'<div class="msg-bubble msg-'+(isC?'coach':'player')+'">'+escHtml(m.content)+'</div>'
      +(isC&&m.is_read?'<div class="msg-read">읽음</div>':'')
      +'<div class="msg-time">'+tStr(m.created_at)+'</div></div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendChatMsg(){
  const input=document.getElementById('chat-input');
  const content=input.value.trim();
  if(!content||!_currentChatPlayerId) return;
  input.value='';
  const btn=document.querySelector('.chat-send-btn');
  if(btn) btn.disabled=true;
  try{
    const {error}=await supa.from('messages').insert({
      player_id:_currentChatPlayerId,
      sender:'coach',
      content,
      is_read:false
    });
    if(error) throw error;
    // 전송 후 즉시 화면 갱신 (realtime 미지원 환경 대비)
    await loadChatMessages(_currentChatPlayerId);
  }catch(e){
    input.value=content; // 실패 시 텍스트 복원
    showToast('전송 실패: '+e.message,true);
  }finally{
    if(btn) btn.disabled=false;
  }
  // notifications는 별도로 (실패해도 채팅에 영향 없음)
  supa.from('notifications').insert({
    title:'코치 메시지',body:content,
    target_type:'player',target_value:_currentChatPlayerId,
    created_by:currentUser?.email||'coach'
  }).then(()=>{}).catch(()=>{});
}

function closeChatThread(){
  document.getElementById('chat-thread-overlay').classList.remove('open');
  if(_chatSub){supa.removeChannel(_chatSub);_chatSub=null;}
  _currentChatPlayerId=null;
  loadChatList();
}

function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

async function showPlayerDetail(playerId){
  const overlay=document.getElementById('player-overlay');
  const content=document.getElementById('player-detail-content');
  overlay.style.display='flex';
  content.innerHTML='<div class="loading"><span class="spinner">⏳</span> 로딩 중...</div>';
  const player=_players.find(p=>p.id===playerId);
  if(!player) return;
  const today=getKSTDateStr();
  const since28=new Date(); since28.setDate(since28.getDate()-28);
  const since7=new Date(); since7.setDate(since7.getDate()-7);
  const [{data:rpe28},{data:gps7},{data:well7}]=await Promise.all([
    supa.from('session_records').select('record_date,rpe,duration').eq('player_id',playerId).gte('record_date',since28.toISOString().split('T')[0]),
    supa.from('gps_records').select('session_date,td,sprint,max_speed,duration').eq('player_id',playerId).gte('session_date',since7.toISOString().split('T')[0]).order('session_date',{ascending:false}),
    supa.from('wellness_records').select('record_date,fatigue,sleep_quality,stress,muscle_soreness').eq('player_id',playerId).gte('record_date',since7.toISOString().split('T')[0]).order('record_date',{ascending:false}),
  ]);
  const sessions=(rpe28||[]).map(r=>({date:r.record_date,rpe:parseFloat(r.rpe)||0,dur:parseFloat(r.duration)||0}));
  const acwrData=calcACWR(sessions,today);
  const mss=parseFloat(player.mss)||0;
  const mvExp=mss>0?calcMVExposure((gps7||[]).map(r=>({date:r.session_date,maxSpeed:parseFloat(r.max_speed)||0})),mss,today):null;
  const todayW=(well7||[]).find(r=>r.record_date===today);
  const acwrColor=v=>!v?'var(--text3)':v>1.5?'#ef4444':v>1.3?'#f59e0b':v<0.8?'#eab308':'#22c55e';
  const wColor=v=>!v?'var(--text3)':v>=4?'#22c55e':v>=3?'#eab308':v>=2?'#f97316':'#ef4444';
  const wt=todayW?(todayW.fatigue||0)+(todayW.sleep_quality||0)+(todayW.stress||0)+(todayW.muscle_soreness||0):null;
  content.innerHTML=
    '<div style="margin-bottom:16px"><div style="font-size:18px;font-weight:700">'+player.name+'</div>'
    +'<div style="font-size:12px;color:var(--text3);margin-top:2px">'+(player.position||'—')+' · MSS '+(mss||'—')+' km/h</div></div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">'
    +'<div style="background:var(--surface2);border-radius:12px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">ACWR</div><div style="font-size:16px;font-weight:600;color:'+acwrColor(acwrData.acwr)+'">'+(acwrData.acwr?acwrData.acwr.toFixed(2):'—')+'</div></div>'
    +'<div style="background:var(--surface2);border-radius:12px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">MSS 미노출</div><div style="font-size:16px;font-weight:600;color:'+(mvExp&&mvExp.daysSinceExposed>=14?'#ef4444':mvExp&&mvExp.daysSinceExposed>=7?'#f59e0b':'#22c55e')+'">'+(mvExp?mvExp.daysSinceExposed+'d':'—')+'</div></div>'
    +'<div style="background:var(--surface2);border-radius:12px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">오늘 웰니스</div>'
    +(wt!==null?'<div style="font-size:16px;font-weight:600;color:'+wColor(wt/4)+'">'+wt+'/20</div>':'<div style="font-size:14px;color:var(--text3)">미입력</div>')+'</div></div>'
    +((gps7||[]).slice(0,5).length?'<div style="font-size:12px;color:var(--text3);font-weight:600;margin-bottom:8px">최근 훈련</div>'
      +(gps7||[]).slice(0,5).map(r=>'<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border);font-size:12px"><span style="color:var(--text3)">'+r.session_date+'</span><span>TD <b>'+parseFloat(r.td).toFixed(1)+'</b>km · Sprint <b>'+(r.sprint?Math.round(r.sprint):'—')+'m</b></span></div>').join(''):'')
    +'<button class="btn-secondary" style="margin-top:16px" onclick="closePlayerOverlay()">닫기</button>';
}
function closePlayerOverlay(e){
  if(!e||e.target===document.getElementById('player-overlay'))
    document.getElementById('player-overlay').style.display='none';

// ══════════════════════════════════════════════════════
// CRI 계산
// ══════════════════════════════════════════════════════
function calcACWR(sessions,today){
  const tD=new Date(today);
  const diff=d=>Math.floor((tD-new Date(d))/86400000);
  let acute=0,cSum=0,cDays=0;
  sessions.forEach(s=>{
    const sRPE=(parseFloat(s.rpe)||0)*(parseFloat(s.dur)||0);
    if(!sRPE) return;
    const d=diff(s.date);
    if(d>=0&&d<7) acute+=sRPE;
    if(d>=0&&d<28){cSum+=sRPE;cDays++;}
  });
  const chronic=cDays>0?(cSum/cDays)*7:0;
  const acwr=chronic>0?acute/chronic:null;
  return{acute:Math.round(acute),chronic:Math.round(chronic),acwr};
}
function calcMVExposure(sessions,mss,today){
  if(!mss||mss<=0) return null;
  const zone5=mss*0.9;
  const tD=new Date(today);
  const diff=d=>Math.floor((tD-new Date(d))/86400000);
  let zone5Days=0,totalDays=0,lastExposed=null,maxSpeedWeek=0;
  [...sessions].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(s=>{
    const d=diff(s.date);
    if(d<0||d>=21) return;
    totalDays++;
    const spd=parseFloat(s.maxSpeed)||0;
    if(spd>=zone5){zone5Days++;if(lastExposed===null||d<lastExposed)lastExposed=d;}
    if(d<7&&spd>maxSpeedWeek) maxSpeedWeek=spd;
  });
  const daysSinceExposed=lastExposed!==null?lastExposed:99;
  const pctMSS=mss>0?(maxSpeedWeek/mss)*100:0;
  return{exposureRatio:totalDays>0?zone5Days/totalDays:0,daysSinceExposed,maxSpeedWeek,pctMSS};
}
function calcWellnessRisk(wellness7,todayW){
  if(!todayW||!wellness7.length) return null;
  const avg=f=>wellness7.reduce((a,r)=>a+(r[f]||0),0)/wellness7.length;
  const base=avg('fatigue')+avg('sleep_quality')+avg('stress')+avg('muscle_soreness');
  const tod=(todayW.fatigue||0)+(todayW.sleep_quality||0)+(todayW.stress||0)+(todayW.muscle_soreness||0);
  const dropPct=base>0?(base-tod)/base:0;
  return{baseline:(base/4).toFixed(1),todayAvg:(tod/4).toFixed(1),dropPct,absScore:tod};
}
function calcRiskLevel(acwr,mvExp,wellData){
  let score=0;const flags=[];
  if(acwr!==null){
    if(acwr>1.5){score+=3;flags.push({type:'ACWR',msg:'ACWR '+acwr.toFixed(2)+' — 급성 과부하'});}
    else if(acwr>1.3){score+=2;flags.push({type:'ACWR',msg:'ACWR '+acwr.toFixed(2)+' — 부하 주의'});}
    else if(acwr<0.8&&acwr>0){score+=1;flags.push({type:'ACWR',msg:'ACWR '+acwr.toFixed(2)+' — 과소부하'});}
  }
  if(mvExp!==null){
    if(mvExp.daysSinceExposed>=14){score+=3;flags.push({type:'MV',msg:'최고속도 '+mvExp.daysSinceExposed+'일 미노출'});}
    else if(mvExp.daysSinceExposed>=7){score+=2;flags.push({type:'MV',msg:'최고속도 '+mvExp.daysSinceExposed+'일 미노출'});}
    else if(mvExp.pctMSS<80){score+=1;flags.push({type:'MV',msg:'MSS '+mvExp.pctMSS.toFixed(0)+'% — 노출 부족'});}
  }
  if(wellData!==null){
    if(wellData.absScore<=8){score+=2;flags.push({type:'W',msg:'웰니스 '+wellData.absScore+'/20 — 과훈련 위험'});}
    else if(wellData.dropPct>=0.25){score+=2;flags.push({type:'W',msg:'웰니스 '+(wellData.dropPct*100).toFixed(0)+'% 급락'});}
    else if(wellData.dropPct>=0.15){score+=1;flags.push({type:'W',msg:'웰니스 '+(wellData.dropPct*100).toFixed(0)+'% 하락'});}
  }
  const level=score>=4?'red':score>=2?'amber':score>=1?'yellow':'green';
  return{score,level,flags};
}
