<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="코치 앱">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>부산아이파크 코치</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c26;
  --border:#2a2a3a; --text:#f0f0f5; --text2:#a0a0b8; --text3:#606078;
  --blue:#3b82f6; --green:#22c55e; --red:#ef4444; --amber:#f59e0b;
  --yellow:#eab308; --accent:#6366f1;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* Login */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
#login-screen h1{font-size:20px;font-weight:700;margin-bottom:4px}
#login-screen p{font-size:13px;color:var(--text3);margin-bottom:32px}
.login-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.login-form input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;font-size:15px;outline:none;width:100%}
.login-form input:focus{border-color:var(--blue)}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px 16px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.btn-primary:active{opacity:.8}
#login-error{font-size:12px;color:var(--red);text-align:center}

/* App */
#app{display:none}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px 10px}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header-title{font-size:16px;font-weight:700}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px}
.btn-logout{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(19,19,26,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;color:var(--text3)}
.nav-item.active .nav-label{color:var(--blue)}
.nav-item.active .nav-icon{filter:brightness(1.3)}

/* Pages */
.page{display:none}
.page.active{display:block}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin:12px 16px}
.card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Player row */
.player-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--border)}
.player-row:last-child{border-bottom:none}
.player-name{font-size:14px;font-weight:500}
.player-pos{font-size:11px;color:var(--text3);margin-top:1px}

/* Badges */
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-red{background:#3b121933;color:#f87171;border:1px solid #ef444440}
.badge-amber{background:#2a1a0033;color:#fbbf24;border:1px solid #f59e0b40}
.badge-yellow{background:#1a1a0033;color:#fde047;border:1px solid #eab30840}
.badge-green{background:#05301633;color:#4ade80;border:1px solid #22c55e40}
.badge-gray{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}

/* Well bars */
.well-bar-wrap{margin-bottom:10px}
.well-bar-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.well-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.well-bar-fill{height:100%;border-radius:3px}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{padding:6px 8px;text-align:center;color:var(--text3);font-weight:500;border-bottom:.5px solid var(--border);background:var(--surface2);white-space:nowrap}
.data-table th:first-child{text-align:left}
.data-table td{padding:7px 8px;text-align:center;border-bottom:.5px solid var(--border)}
.data-table td:first-child{text-align:left}
.data-table tr:last-child td{border-bottom:none}
.data-table tr.today-row td{background:rgba(22,163,74,.06)}

/* Forms */
.notify-form{display:flex;flex-direction:column;gap:10px}
.notify-form input,.notify-form textarea,.notify-form select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;width:100%;resize:none}
.notify-form input:focus,.notify-form textarea:focus,.notify-form select:focus{border-color:var(--blue)}
.notify-form input[type="time"]{color-scheme:dark}
.notify-form textarea{min-height:80px}

/* Buttons */
.btn-send{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.btn-send:active{opacity:.8}
.btn-send:disabled{opacity:.4;cursor:default}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;width:100%}
.btn-secondary:active{opacity:.8}
.refresh-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px}

/* Loading / Empty */
.loading{text-align:center;padding:40px 20px;font-size:13px;color:var(--text3)}
.spinner{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:24px 16px;background:var(--surface2);border-radius:12px;margin:8px 0}
.empty-state p{font-size:13px;color:var(--text3)}

/* Overlay / Sheet */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:flex-end}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:88vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}

/* Risk cards */
.risk-card{border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid}
.risk-card-red{background:#3b121920;border-color:#ef444450}
.risk-card-amber{background:#2a1a0020;border-color:#f59e0b50}
.risk-card-yellow{background:#1a1a0020;border-color:#eab30850}

/* ─── Schedule Card ─────────────────────────────────── */
.sched-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sched-header-btns{display:flex;gap:6px}
.sched-btn-add{font-size:11px;padding:5px 11px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600}
.sched-btn-week{font-size:11px;padding:5px 11px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit}
.sched-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sched-carousel::-webkit-scrollbar{display:none}
.sched-slide{scroll-snap-align:start;flex:0 0 100%;width:100%;min-height:100px}
.sched-dots{display:flex;justify-content:center;align-items:center;gap:5px;padding:10px 0 2px}
.sched-dot{width:6px;height:6px;border-radius:3px;background:var(--border);transition:all .25s;cursor:pointer;flex-shrink:0}
.sched-dot.active{width:18px;background:#22c55e}
.sched-dot.today-dot{background:rgba(34,197,94,.35)}
.sched-col-hdr{text-align:center;padding:8px 2px 10px;border-bottom:1px solid var(--border);margin-bottom:6px}
.sched-col-hdr-day{font-size:11px;font-weight:600;margin-bottom:6px;color:var(--text3)}
.sched-col-hdr-numwrap{display:flex;align-items:center;justify-content:center;height:40px}
.sched-col-hdr-num{font-size:24px;font-weight:800;line-height:1;color:var(--text)}
.sched-today-circle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#22c55e;color:#fff;font-size:22px;font-weight:800;line-height:1}
.sched-col-hdr.today{background:rgba(34,197,94,.07);border-radius:8px 8px 0 0;border-bottom-color:rgba(34,197,94,.5)}
.sched-col-body{display:flex;flex-direction:column;gap:5px}
.sched-pill{display:flex;align-items:baseline;gap:5px;border-radius:7px;padding:7px 9px;cursor:pointer;border-left:4px solid;transition:opacity .12s;user-select:none}
.sched-pill:active{opacity:.6}
.sched-pill-time{font-size:10px;font-weight:700;flex-shrink:0;opacity:.9;letter-spacing:.2px}
.sched-pill-title{font-size:11px;font-weight:600;word-break:keep-all;line-height:1.4;flex:1}
.sched-add-btn{font-size:18px;text-align:center;color:var(--border);padding:5px 0;cursor:pointer;border-radius:6px;border:1px dashed var(--border);margin-top:2px;transition:all .1s;line-height:1}
.sched-add-btn:active{background:var(--surface2);color:var(--text3)}
.sched-md-tag{font-size:9px;font-weight:700;margin-top:4px;line-height:1;text-align:center}

/* Sub-tabs */
.sub-tabs{display:flex;gap:8px;margin-bottom:12px}
.sub-tab{flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2)}
.sub-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pm-tab{flex:1;padding:8px 0;text-align:center;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;color:var(--text3)}
.pm-tab.active{background:var(--blue);color:#fff}
.pm-chips{display:flex;gap:6px;overflow-x:auto;padding:4px 16px 8px;-webkit-overflow-scrolling:touch}
.pm-chip{flex:0 0 auto;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap}
.pm-chip:active{background:var(--surface2)}

/* Chat list */
.chat-list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.chat-list-item:last-child{border-bottom:none}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:14px;font-weight:500}
.chat-preview{font-size:12px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:10px;color:var(--text3)}
.unread-badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}

/* Chat thread overlay */
.chat-thread-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.chat-thread-overlay.open{transform:translateX(0)}
.chat-thread-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--border);background:var(--surface)}
.chat-thread-back{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:0;line-height:1}
.chat-thread-name{font-size:16px;font-weight:600;flex:1}
.chat-thread-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word}
.msg-coach{background:var(--blue);color:#fff;border-radius:16px 16px 4px 16px;align-self:flex-end}
.msg-player{background:var(--surface2);color:var(--text);border-radius:16px 16px 16px 4px;align-self:flex-start}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px}
.msg-read{font-size:10px;color:#4ade80;margin-top:1px;font-weight:600}
.msg-wrap-coach{display:flex;flex-direction:column;align-items:flex-end}
.msg-wrap-player{display:flex;flex-direction:column;align-items:flex-start}
.chat-thread-input{display:flex;gap:8px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));border-top:.5px solid var(--border);background:var(--surface)}
.chat-input-field{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none}
.chat-input-field:focus{border-color:var(--blue)}
.chat-send-btn{background:var(--blue);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1c2a1c;border:1px solid #22c55e60;color:#4ade80;border-radius:12px;padding:10px 20px;font-size:13px;font-weight:500;z-index:400;white-space:nowrap;opacity:0;transition:opacity .2s}
.toast.error{background:#2a1212;border-color:#ef444460;color:#f87171}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div style="font-size:36px;margin-bottom:12px">⚽</div>
  <h1>부산아이파크</h1>
  <p>코치 전용 모바일 앱</p>
  <div class="login-form">
    <input type="email" id="login-email" placeholder="이메일" autocomplete="email">
    <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">로그인</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">⚽ 부산아이파크</div>
        <div class="header-sub" id="header-sub">코치 모바일</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- Pull to Refresh 인디케이터 -->
  <div id="ptr-bar" style="position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);border-bottom:1px solid var(--border);z-index:999;transform:translateY(-52px);opacity:0;pointer-events:none;will-change:transform">
    <span id="ptr-icon" style="font-size:20px;display:inline-block;transition:transform 0.2s">↓</span>
    <span id="ptr-text" style="font-size:12px;color:var(--text3)">당겨서 새로고침</span>
  </div>

  <!-- 1. 홈 -->
  <div class="page active" id="page-home">
    <div id="home-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
  </div>

  <!-- 2. 웰니스 -->
  <div class="page" id="page-wellness">
    <div style="padding:12px 16px 0">
      <div class="sub-tabs">
        <div class="sub-tab active" id="wtab-today" onclick="switchWellnessTab('today')">오늘</div>
        <div class="sub-tab" id="wtab-week" onclick="switchWellnessTab('week')">이번 주</div>
      </div>
    </div>
    <div id="wellness-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
    <div id="wellness-week-content" style="display:none"></div>
  </div>

  <!-- 3. RPE -->
  <div class="page" id="page-rpe">
    <div style="padding:12px 16px 0">
      <div class="sub-tabs">
        <div class="sub-tab active" id="rtab-today" onclick="switchRpeTab('today')">오늘</div>
        <div class="sub-tab" id="rtab-week" onclick="switchRpeTab('week')">이번 주</div>
      </div>
    </div>
    <div id="rpe-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
    <div id="rpe-week-content" style="display:none"></div>
  </div>

  <!-- 4. GPS 데이터 -->
  <div class="page" id="page-training">
    <div style="padding:12px 16px 0">
      <div class="sub-tabs" style="overflow-x:auto">
        <div class="sub-tab active" id="ttab-block" onclick="switchTrainingTab('block')">주기화</div>
        <div class="sub-tab" id="ttab-dev" onclick="switchTrainingTab('dev')">편차</div>
        <div class="sub-tab" id="ttab-match" onclick="switchTrainingTab('match')">경기</div>
      </div>
    </div>
    <div id="training-content" style="padding:0 16px"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
  </div>

  <!-- 5. 알림 -->
  <div class="page" id="page-notify">
    <div style="padding:12px 16px 0">
      <div class="sub-tabs">
        <div class="sub-tab active" id="stab-announce" onclick="switchNotifyTab('announce')">📢 공지사항</div>
        <div class="sub-tab" id="stab-chat" onclick="switchNotifyTab('chat')">💬 채팅</div>
      </div>
    </div>
    <!-- 공지사항 -->
    <div id="notify-announce">
      <div class="card">
        <div class="card-title">📢 전체 공지</div>
        <div class="notify-form">
          <input type="text" id="announce-title" placeholder="공지 제목">
          <textarea id="announce-body" placeholder="공지 내용을 입력하세요"></textarea>
          <button class="btn-send" id="announce-btn" onclick="sendAnnouncement()">📢 전체 발송</button>
        </div>
      </div>
    </div>
    <!-- 채팅 목록 -->
    <div id="notify-chat" style="display:none">
      <div class="card">
        <div class="card-title" style="margin-bottom:4px">💬 1:1 채팅 <span style="font-size:11px;font-weight:400;color:var(--text3)">선수를 탭해서 대화</span></div>
        <div id="chat-list-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
      </div>
    </div>
  </div>

  <!-- 바텀 탭 -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home',this)">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">홈</div>
    </div>
    <div class="nav-item" onclick="switchPage('wellness',this)">
      <div class="nav-icon">💚</div>
      <div class="nav-label">웰니스</div>
    </div>
    <div class="nav-item" onclick="switchPage('rpe',this)">
      <div class="nav-icon">💢</div>
      <div class="nav-label">RPE</div>
    </div>
    <div class="nav-item" onclick="switchPage('training',this)">
      <div class="nav-icon">📡</div>
      <div class="nav-label">GPS</div>
    </div>
    <div class="nav-item" onclick="switchPage('notify',this)">
      <div class="nav-icon">💬</div>
      <div class="nav-label">알림</div>
    </div>
  </nav>
</div>

<!-- 선수 상세 시트 -->
<div class="overlay" id="player-overlay" style="display:none" onclick="closePlayerOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="player-detail-content"></div>
  </div>
</div>

<!-- 선수 명단 시트 -->
<div class="overlay" id="pmgmt-overlay" style="display:none" onclick="closePmgmt(event)">
  <div class="sheet" style="max-height:92vh">
    <div class="sheet-handle"></div>
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">👥 선수 명단</div>
    <div id="pmgmt-content"><div class="loading"><span class="spinner">⏳</span> 로딩 중...</div></div>
  </div>
</div>

<!-- 선수 프로필 편집 시트 -->
<div class="overlay" id="pedit-overlay" style="display:none" onclick="closePedit(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="font-size:15px;font-weight:700;margin-bottom:14px" id="pedit-title">선수 편집</div>
    <div class="notify-form" style="display:flex;flex-direction:column;gap:10px">
      <input type="hidden" id="pedit-id">

// 1. 홈 — 팀일정 / 부상자 현황 / 관리 우선순위
// ══════════════════════════════════════════════════════
// 경기 팀 평균: (지표합)/(출전시간합)×max(출전시간) — 선수수·시간차 보정 (메인 웹 matchAvg 이식)
function matchAvg(arr, field){
  const vrs=arr.filter(r=>parseFloat(r[field])>0&&parseFloat(r.duration)>0);
  if(!vrs.length) return null;
  const maxDur=Math.max(...vrs.map(r=>parseFloat(r.duration)));
  const sumVal=vrs.reduce((a,r)=>a+(parseFloat(r[field])||0),0);
  const sumDur=vrs.reduce((a,r)=>a+(parseFloat(r.duration)||0),0);
  return sumDur>0?sumVal/sumDur*maxDur:null;
}
// 마이크로사이클 시작일 (최근 블록 시작 → MATCH+1 → 캘린더 월요일) — 메인 웹 getMicrocycleStart 이식
async function getMicrocycleStart(todayStr){
  const s28=new Date(todayStr+'T12:00:00'); s28.setDate(s28.getDate()-28);
  const s28s=s28.toISOString().split('T')[0];
  const {data:bdRows}=await supa.from('block_days').select('plan_date')
    .lte('plan_date',todayStr).gte('plan_date',s28s).neq('day_label','REST')
    .order('plan_date',{ascending:false});
  if(bdRows&&bdRows.length){
    const dates=bdRows.map(r=>r.plan_date);
    let blockStart=dates[0];
    for(let i=0;i<dates.length-1;i++){
      const curr=new Date(dates[i]+'T12:00:00'), prev=new Date(dates[i+1]+'T12:00:00');
      if((curr-prev)/86400000>=3){ blockStart=dates[i]; break; }
      blockStart=dates[i+1];
    }
    return blockStart;
  }
  const {data}=await supa.from('weekly_schedule').select('event_date').eq('md_stage','MATCH')
    .lte('event_date',todayStr).order('event_date',{ascending:false}).limit(1).maybeSingle();
  if(data&&data.event_date){ const d=new Date(data.event_date+'T12:00:00'); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; }
  const now=kst(); const dow=now.getDay(); const mon=new Date(now); mon.setDate(now.getDate()-(dow===0?6:dow-1));
  return mon.toISOString().split('T')[0];
}
// 훈련 팀 평균 (AM+PM 선수별 합산 후 최빈 출전시간 정규화) — 메인 웹 trainAvg 이식
function trainAvgTeam(arr,field){
  const merged={};
  arr.forEach(r=>{ const pid=r.player_id||r.id||JSON.stringify(r);
    if(!merged[pid]) merged[pid]={_td:0,_running_high:0,_sprint:0,_accel:0,_rhie:0,_duration:0};
    ['td','running_high','sprint','accel','rhie','duration'].forEach(f=>{ merged[pid]['_'+f]+=(parseFloat(r[f])||0); });
  });
  const vrs=Object.values(merged).map(r=>({val:r['_'+field],dur:r._duration})).filter(r=>r.val>0&&r.dur>0);
  if(!vrs.length) return null;
  const dc={}; vrs.forEach(r=>{const d=Math.round(r.dur);dc[d]=(dc[d]||0)+1;});
  const mDur=parseFloat(Object.entries(dc).sort((a,b)=>b[1]-a[1]||parseFloat(b[0])-parseFloat(a[0]))[0][0]);
  const sv=vrs.reduce((a,r)=>a+r.val,0), sd=vrs.reduce((a,r)=>a+r.dur,0);
  return sd>0?sv/sd*mDur:null;
}

    +'<div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--text3);margin-bottom:3px">주간sRPE</div><div style="font-size:16px;font-weight:700;color:#a78bfa">'+(teamWeekSRPE?teamWeekSRPE.toLocaleString():'—')+'</div></div>'
    +'<div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--text3);margin-bottom:3px">웰니스응답</div><div style="font-size:16px;font-weight:700;color:'+(wellResp>=Math.ceil(_players.length*0.8)?'#22c55e':wellResp>=Math.ceil(_players.length*0.5)?'#eab308':'#ef4444')+'">'+wellResp+'/'+_players.length+'</div></div>'

    +'</div></div>';

  const levelCfg={red:{bg:'#3b121920',border:'#ef4444',color:'#f87171',label:'🔴 고위험'},amber:{bg:'#2a1a0020',border:'#f59e0b',color:'#fbbf24',label:'🟠 주의'},yellow:{bg:'#1a1a0020',border:'#eab308',color:'#fde047',label:'🟡 모니터링'}};

  const _allMKeys=[...new Set((matchFT||[]).map(r=>r.match_date+'__'+r.opponent))].sort((a,b)=>b.localeCompare(a));

  // 오늘 목표 그리드 (목표값 + 경기기준 대비 %)

  const weekRow=(label,actualVal,targetVal,targetSet,unit,color)=>{

      +(matchRef3.hsr?'<span style="font-size:12px;color:var(--text3)">HSR <strong style="color:#f59e0b">'+Math.round(matchRef3.hsr)+'m</strong></span>':'')
      +(matchRef3.sprint?'<span style="font-size:12px;color:var(--text3)">Sprint <strong style="color:#ef4444">'+Math.round(matchRef3.sprint)+'m</strong></span>':'')
      +(matchRef3.accel?'<span style="font-size:12px;color:var(--text3)">가속 <strong style="color:#fb923c">'+Math.round(matchRef3.accel)+'회</strong></span>':'')
      +(matchRef3.rhie?'<span style="font-size:12px;color:var(--text3)">RHIE <strong style="color:#34d399">'+matchRef3.rhie.toFixed(1)+'회</strong></span>':'')
      +'</div></div>'
    : '';

  el.innerHTML=
    '<div style="padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:center">'
    +'<div style="font-size:13px;color:var(--text3)">'+today+' ('+DOW[new Date(today+'T12:00:00').getDay()]+')</div>'
    +'<button class="refresh-btn" onclick="_schedDayOffset=0;_loadedPages[\'home\']=false;loadHome()">🔄</button></div>'

    +'<div class="pm-chips">'

// 일정 카드 — 7일 캐러셀
// ══════════════════════════════════════════════════════
function getWeekDays(){
  const now=kst();
  const day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1));
  mon.setHours(0,0,0,0);
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d.toISOString().split('T')[0]);}
  return days;
}

async function loadScheduleCard(){
  const el=document.getElementById('sched-card');
  if(!el) return;
  el.innerHTML='<div class="loading" style="padding:16px 0"><span class="spinner">⏳</span></div>';

  const today=getKSTDateStr();
  const days=getWeekDays();

  const {data:weekSched}=await supa.from('weekly_schedule')
    .select('id,event_date,event_type,md_stage,title,start_time')
    .gte('event_date',days[0]).lte('event_date',days[6])
    .order('event_date').order('start_time',{nullsFirst:false});

  const schedByDate={};
  (weekSched||[]).forEach(e=>{
    if(!schedByDate[e.event_date]) schedByDate[e.event_date]=[];
    schedByDate[e.event_date].push(e);
  });

  const slidesHtml=days.map((ds,idx)=>{
    const d=new Date(ds+'T12:00:00');
    const isT=ds===today;
    const dw=d.getDay();
    const dc=dw===0?'#f87171':dw===6?'#93c5fd':'var(--text2)';
    const evts=schedByDate[ds]||[];
    const md=evts.find(e=>e.md_stage)?.md_stage||'';
    const mdColor=md?(MD_COLORS[md]||'#888'):'';

    const pills=evts.map(e=>{
      const type=guessEventType(e.title,e.event_type);
      const c=EVENT_TYPE_COLORS[type]||EVENT_TYPE_COLORS['DEFAULT'];
      const timeSpan=e.start_time?'<span class="sched-pill-time">'+e.start_time.slice(0,5)+'</span>':'';
      return '<div class="sched-pill" style="background:'+c.bg+';border-left-color:'+c.border+';color:'+c.text
        +'" onclick="openSchedEdit(\''+e.id+'\')">'
        +timeSpan+'<span class="sched-pill-title">'+escHtml(e.title||e.event_type||'')+'</span></div>';
    }).join('');

    const numHtml=isT
      ?'<div class="sched-today-circle">'+d.getDate()+'</div>'
      :'<div class="sched-col-hdr-num" style="color:'+dc+'">'+d.getDate()+'</div>';

    return '<div class="sched-slide" id="sched-slide-'+idx+'">'
      +'<div class="sched-col-hdr'+(isT?' today':'')+'">'
      +'<div class="sched-col-hdr-day" style="color:'+dc+'">'+DOW[dw]+'</div>'
      +'<div class="sched-col-hdr-numwrap">'+numHtml+'</div>'
      +(md?'<div class="sched-md-tag" style="color:'+mdColor+'">'+md+'</div>':'')
      +'</div>'
      +'<div class="sched-col-body">'+pills
      +'<div class="sched-add-btn" onclick="openSchedAdd(\''+ds+'\')">+</div>'
      +'</div></div>';
  }).join('');

  const dotsHtml=days.map((ds,i)=>'<div class="sched-dot'+(ds===today?' today-dot':'')+'" onclick="scrollSchedTo('+i+')"></div>').join('');

  el.innerHTML=
    '<div class="sched-header-row">'
    +'<div class="card-title" style="margin-bottom:0">📅 팀 일정</div>'
    +'<div class="sched-header-btns">'
    +'<button class="sched-btn-add" onclick="openSchedAdd()">+ 추가</button>'
    +'<button class="sched-btn-week" onclick="openWeekInput()">주간 입력</button>'
    +'</div></div>'
    +'<div class="sched-carousel" id="sched-carousel">'+slidesHtml+'</div>'
    +'<div class="sched-dots" id="sched-dots">'+dotsHtml+'</div>';

  const todayIdx=days.indexOf(today);
  requestAnimationFrame(()=>scrollSchedTo(todayIdx>=0?todayIdx:0, false));
  initSchedCarousel(days, today);
}

function scrollSchedTo(idx, smooth=true){
  const carousel=document.getElementById('sched-carousel');
  const slide=document.getElementById('sched-slide-'+idx);
  if(!carousel||!slide) return;
  carousel.scrollTo({left:slide.offsetLeft, behavior:smooth?'smooth':'instant'});
}

function initSchedCarousel(days, today){
  const carousel=document.getElementById('sched-carousel');
  if(!carousel) return;
  let ticking=false;
  carousel.addEventListener('scroll',()=>{
    if(ticking) return;
    ticking=true;
    requestAnimationFrame(()=>{
      const idx=Math.round(carousel.scrollLeft/carousel.clientWidth);
      document.querySelectorAll('.sched-dot').forEach((dot,i)=>{
        const isActive=i===idx;
        const isToday=days[i]===today;
        dot.classList.toggle('active',isActive);
        if(!isActive) dot.style.background=isToday?'rgba(34,197,94,.4)':'';
        else dot.style.background='';
      });
      ticking=false;
    });
  },{passive:true});
}

function guessEventType(title, eventType){
  // DB 값이 영문이면 그대로 사용 (웹앱과 동일한 키)
  if(eventType&&eventType.trim()){
    const up=eventType.trim().toUpperCase();
    if(EVENT_TYPE_COLORS[up]) return up;
  }
  // event_type 없으면 제목 키워드로 감지
  const t=(title||'').replace(/\s/g,'').toUpperCase();
  if(/GYM|웨이트|근력/.test(t)) return 'GYM';
  if(/훈련|TRAINING|전술/.test(t)) return 'TRAINING';
  if(/경기|MATCH/.test(t)) return 'MATCH';
  if(/조식|중식|석식|식사|단체식|MEAL/.test(t)) return 'MEAL';
  if(/간식|SNACK/.test(t)) return 'SNACK';
  if(/미팅|회의|이벤트|EVENT|자산관리/.test(t)) return 'EVENT';
  if(/휴식|REST|자유/.test(t)) return 'REST';
  return 'DEFAULT';
}


function openSchedAdd(dateStr){
  _schedEditId=null;
  _schedEditDate=dateStr||null;
  const dateInputEl=document.getElementById('sched-date-input');
  document.getElementById('sched-sheet-title').textContent='일정 추가';
  if(dateStr){
    const d=new Date(dateStr+'T12:00:00');
    document.getElementById('sched-date-display').textContent=dateStr+' ('+DOW[d.getDay()]+')';
    dateInputEl.style.display='none';
  } else {
    document.getElementById('sched-date-display').textContent='';
    dateInputEl.value=getKSTDateStr();
    dateInputEl.style.display='block';
  }
  document.getElementById('sched-start-time').value='';
  document.getElementById('sched-title-input').value='';
  document.getElementById('sched-event-type').value='';
  document.getElementById('sched-md-stage').value='';
  document.getElementById('sched-delete-btn').style.display='none';
  document.getElementById('sched-overlay').style.display='flex';
}

async function openSchedEdit(id){
  _schedEditId=id;
  const {data}=await supa.from('weekly_schedule').select('*').eq('id',id).single();
  if(!data) return;
  _schedEditDate=data.event_date;
  const d=new Date(data.event_date+'T12:00:00');
  document.getElementById('sched-sheet-title').textContent='일정 수정';
  document.getElementById('sched-date-display').textContent=data.event_date+' ('+DOW[d.getDay()]+')';
  document.getElementById('sched-start-time').value=data.start_time?data.start_time.slice(0,5):'';
  document.getElementById('sched-title-input').value=data.title||'';
  document.getElementById('sched-event-type').value=data.event_type||'';
  document.getElementById('sched-md-stage').value=data.md_stage||'';
  document.getElementById('sched-delete-btn').style.display='block';
  document.getElementById('sched-overlay').style.display='flex';
}

async function saveSchedEvent(){
  let eventDate=_schedEditDate;
  if(!eventDate){
    eventDate=document.getElementById('sched-date-input').value;
    if(!eventDate){showToast('날짜를 선택하세요',true);return;}
  }
  const title=document.getElementById('sched-title-input').value.trim();
  const start_time=document.getElementById('sched-start-time').value||null;
  const event_type=document.getElementById('sched-event-type').value||null;
  const md_stage=document.getElementById('sched-md-stage').value||null;
  if(!title){showToast('제목을 입력하세요',true);return;}
  const btn=document.getElementById('sched-save-btn');
  btn.disabled=true;btn.textContent='저장 중...';
  try{
    if(_schedEditId){
      const {error}=await supa.from('weekly_schedule').update({title,start_time,event_type,md_stage}).eq('id',_schedEditId);
      if(error) throw error;
    } else {
      const {error}=await supa.from('weekly_schedule').insert({event_date:eventDate,title,start_time,event_type,md_stage});
      if(error) throw error;
    }
    closeSchedOverlay();
    loadScheduleCard();
    if(document.getElementById('week-input-overlay').style.display!=='none') loadWeekInputContent();
    showToast('✅ 저장됨');
  }catch(e){showToast('저장 실패: '+e.message,true);}
  finally{btn.disabled=false;btn.textContent='저장';}
}

async function deleteSchedEvent(){
  if(!_schedEditId) return;
  if(!confirm('이 일정을 삭제할까요?')) return;
  try{
    const {error}=await supa.from('weekly_schedule').delete().eq('id',_schedEditId);
    if(error) throw error;
    closeSchedOverlay();
    loadScheduleCard();
    if(document.getElementById('week-input-overlay').style.display!=='none') loadWeekInputContent();
    showToast('✅ 삭제됨');
  }catch(e){showToast('삭제 실패: '+e.message,true);}
}

function closeSchedOverlay(e){
  if(!e||e.target===document.getElementById('sched-overlay'))
    document.getElementById('sched-overlay').style.display='none';
}

function mobileRpeChangeDate(delta){
  const base=_rpeViewDate||getKSTDateStr();
  const d=new Date(base+'T00:00:00');
  d.setDate(d.getDate()+delta);
  const next=d.toISOString().split('T')[0];
  if(next>getKSTDateStr()) return; // 미래 차단
  _rpeViewDate=(next===getKSTDateStr())?null:next;
  _loadedPages['rpe']=false;loadRpe();
}
async function loadRpe(){
  const el=document.getElementById('rpe-content');
  el.innerHTML='<div class="loading"><span class="spinner">⏳</span> 로딩 중...</div>';
  const kstToday=getKSTDateStr();
  const today=_rpeViewDate||kstToday;
  const isToday=today===kstToday;
  const [{data:todayRpe},{data:todayGps}]=await Promise.all([
    supa.from('session_records').select('id,player_id,rpe,duration,session_type,created_at').eq('record_date',today).order('created_at'),
    supa.from('gps_records').select('player_id,session_label,duration').eq('session_date',today)
  ]);
  // GPS duration 자동 동기화 (날짜 수정 케이스·GK 포함 강화)
  const rpeNullDur=(todayRpe||[]).filter(r=>parseFloat(r.rpe)>0&&!r.duration);
  if(rpeNullDur.length&&(todayGps||[]).length){
    for(const rec of rpeNullDur){
      const pg=(todayGps||[]).filter(g=>g.player_id===rec.player_id&&parseFloat(g.duration)>0);
      if(!pg.length) continue;
      const sess=(rec.session_type||'AM').trim().toUpperCase();
      let g=pg.find(g=>(g.session_label||'').trim().toUpperCase()===sess); // 1) 세션 레이블 일치
      if(!g&&pg.length===1) g=pg[0];  // 2) 단일 GPS fallback
      if(!g) g=pg[0];                  // 3) 복수일 때 첫번째 (GK 등)
      if(g?.duration){
        await supa.from('session_records').update({duration:parseFloat(g.duration)}).eq('id',rec.id);
        rec.duration=parseFloat(g.duration);
      }
    }
  }
  // 예상 세션 (GPS에서 AM/PM 구분)
  const expectedSessions=[...new Set((todayGps||[]).map(r=>(r.session_label||'').trim().toUpperCase()).filter(s=>s==='AM'||s==='PM'))].sort();
  const hasGps=expectedSessions.length>0;
  // 선수별 세션 배열로 그룹핑
  const rpeMap={};
  (todayRpe||[]).forEach(r=>{
    if(!rpeMap[r.player_id]) rpeMap[r.player_id]=[];
    rpeMap[r.player_id].push(r);
  });
  const getSubmitted=pid=>(rpeMap[pid]||[]).filter(r=>parseFloat(r.rpe)>0).map(r=>(r.session_type||'AM').trim().toUpperCase());
  const responded=_players.filter(p=>rpeMap[p.id]?.some(r=>parseFloat(r.rpe)>0));
  const noResp=_players.filter(p=>!rpeMap[p.id]?.some(r=>parseFloat(r.rpe)>0));
  const rpeColor=v=>!v?'var(--text3)':v>=8?'#ef4444':v>=6?'#f97316':v>=4?'#eab308':'#22c55e';
  const typeOpts=t=>['AM','PM','추가','개인훈련'].map(v=>`<option value="${v}"${(t||'AM')===v?' selected':''}>${v}</option>`).join('');
  // 세션별 통계 (GPS 기준)
  const sessionStats=hasGps?expectedSessions.map(sess=>{
    const cnt=_players.filter(p=>getSubmitted(p.id).includes(sess)).length;
    return {sess,cnt,missing:_players.length-cnt};
  }):[];
  // 응답했지만 일부 세션 누락된 선수
  const partialMissing=hasGps?responded.filter(p=>expectedSessions.some(s=>!getSubmitted(p.id).includes(s))):[];
  // 팀 평균
  const plSRPEs=responded.map(p=>(rpeMap[p.id]||[]).reduce((s,r)=>{const rv=parseFloat(r.rpe)||0,dur=parseFloat(r.duration)||0;return s+(rv*dur);},0)).filter(v=>v>0);
  const avgSRPE=plSRPEs.length?Math.round(plSRPEs.reduce((a,b)=>a+b,0)/plSRPEs.length):null;
  const validRpe=(todayRpe||[]).filter(r=>parseFloat(r.rpe)>0);
  const avgRpe=validRpe.length?validRpe.reduce((s,r)=>s+parseFloat(r.rpe),0)/validRpe.length:null;
  const validDur=(todayRpe||[]).filter(r=>parseFloat(r.duration)>0);
  const avgDur=validDur.length?validDur.reduce((s,r)=>s+parseFloat(r.duration),0)/validDur.length:null;
  // 테이블 rows — 코치 웹 AM/PM 컬럼형 (선수 / AM RPE / AM sRPE / PM RPE / PM sRPE / 총 sRPE)
  const fmtTime=ts=>{ if(!ts) return ''; try{ return new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Seoul'}); }catch(e){ return ''; } };
  const jsName=p=>(p.name||'').replace(/'/g,"\\'");
  const totalOf=p=>(rpeMap[p.id]||[]).reduce((s,r)=>s+(parseFloat(r.rpe)||0)*(parseFloat(r.duration)||0),0);
  const srpeOf=rec=>{ if(rec&&parseFloat(rec.rpe)>0&&parseFloat(rec.duration)>0) return Math.round(parseFloat(rec.rpe)*parseFloat(rec.duration)); return null; };
  const rpeValCell=(rec,p,sess)=>{
    const rv=rec?parseFloat(rec.rpe):0;
    if(rec&&rv>0){ const tm=fmtTime(rec.created_at);
      return '<span onclick="mobileOpenRpeModal(\''+rec.id+'\',\''+p.id+'\',\''+jsName(p)+'\',\''+sess+'\','+rv+',\''+today+'\')" style="font-size:15px;font-weight:700;color:'+rpeColor(rv)+';cursor:pointer;border-bottom:1px dashed '+rpeColor(rv)+'">'+rv+'</span>'+(tm?' <span style="font-size:9px;color:var(--text3)">'+tm+'</span>':''); }
    const idArg=rec?'\''+rec.id+'\'':'null';
    return '<button onclick="mobileOpenRpeModal('+idArg+',\''+p.id+'\',\''+jsName(p)+'\',\''+sess+'\',\'\',\''+today+'\')" style="font-size:10px;padding:3px 9px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.35);color:#818cf8;border-radius:6px;cursor:pointer;font-family:inherit;white-space:nowrap">+ 추가</button>';
  };
  const posRank=pos=>{ const p=(pos||'').toUpperCase();
    if(p.includes('GK')||p.includes('골키퍼')) return 4;
    if(/CB|RB|LB|WB|SW|\bDF\b|DEF|백|수비/.test(p)) return 0;
    if(/DM|CM|AM|RM|LM|\bMF\b|MID|미드/.test(p)) return 1;
    if(/ST|CF|\bFW\b|WG|RW|LW|WF|FWD|공격/.test(p)) return 2;
    return 3;
  };
  const sortedPlayers=[..._players].sort((a,b)=>posRank(a.position)-posRank(b.position)||(a.position||'').localeCompare(b.position||'','ko')||(a.name||'').localeCompare(b.name||'','ko'));
  const tableRows=sortedPlayers.map(p=>{
    const sessions=rpeMap[p.id]||[];
    const amRec=sessions.find(r=>(r.session_type||'AM').trim().toUpperCase()==='AM');
    const pmRec=sessions.find(r=>(r.session_type||'').trim().toUpperCase()==='PM');
    const amS=srpeOf(amRec), pmS=srpeOf(pmRec);
    const tot=Math.round(totalOf(p));
    return '<tr>'
      +'<td style="padding:6px 8px;white-space:nowrap"><div style="font-size:12px;font-weight:500">'+escHtml(p.name)+'</div><div style="font-size:10px;color:var(--text3)">'+(p.position||'—')+'</div></td>'
      +'<td style="padding:6px 8px;white-space:nowrap">'+rpeValCell(amRec,p,'AM')+'</td>'
      +'<td style="padding:6px 8px;color:#a78bfa">'+(amS!=null?amS:'—')+'</td>'
      +'<td style="padding:6px 8px;white-space:nowrap">'+rpeValCell(pmRec,p,'PM')+'</td>'
      +'<td style="padding:6px 8px;color:#a78bfa">'+(pmS!=null?pmS:'—')+'</td>'
      +'<td style="padding:6px 8px;color:#a78bfa;font-weight:700">'+(tot>0?tot:'—')+'</td>'
      +'</tr>';
  }).join('');

  el.innerHTML=
    // 날짜 네비게이션 바
    '<div style="padding:10px 16px 4px;display:flex;align-items:center;gap:8px">'
    +'<button onclick="mobileRpeChangeDate(-1)" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit">◀</button>'
    +'<div style="flex:1;text-align:center">'
    +(isToday?'<span style="font-size:10px;font-weight:600;color:var(--accent2);display:block;margin-bottom:1px">오늘</span>':'')
    +'<span style="font-size:13px;font-weight:700;color:var(--text)">'+today+'</span>'
    +'<span style="font-size:11px;color:var(--text3);margin-left:6px">RPE '+responded.length+'/'+_players.length+'명</span>'
    +'</div>'
    +(isToday
      ?'<button class="refresh-btn" onclick="_loadedPages[\'rpe\']=false;loadRpe()">🔄</button>'
      :'<button onclick="mobileRpeChangeDate(1)" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit">▶</button>')
    +'</div>'

    // 헤더 요약 + AM/PM 테이블 (코치 웹 형식)
    +'<div class="card"><div style="font-size:11px;color:var(--text3)">'+today+' RPE 현황</div>'
      +'<div style="font-size:14px;font-weight:600;margin-top:3px">'+responded.length+'/'+_players.length+'명 입력 · 팀 평균 sRPE <span style="color:#a78bfa">'+(avgSRPE!=null?avgSRPE:'—')+'</span></div></div>'

    +'<div class="card" style="padding:12px 0"><div style="overflow-x:auto;padding:0 16px"><table class="data-table" style="min-width:540px"><thead><tr><th>선수</th><th>AM RPE</th><th>AM sRPE</th><th>PM RPE</th><th>PM sRPE</th><th>총 sRPE</th></tr></thead><tbody>'
    +(tableRows||'<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">데이터 없음</td></tr>')
    +'</tbody></table></div></div>'

    +(noResp.length?'<div class="card"><div class="card-title">⚠️ RPE 미응답 <span style="font-size:11px;font-weight:400;color:var(--text3)">'+noResp.length+'명</span></div>'
      +noResp.map(p=>'<div class="player-row"><div><div class="player-name">'+escHtml(p.name)+'</div><div class="player-pos">'+(p.position||'—')+'</div></div>'
        +'<button data-rpereq="'+p.id+'" onclick="sendRpeReminder(\''+p.id+'\',\''+(p.name||'').replace(/\x27/g,"\\\x27")+'\',this)" style="font-size:11px;padding:6px 11px;background:var(--surface2);border:1px solid var(--blue);color:#93c5fd;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap">📨 RPE 입력 요청</button></div>').join('')
      +(isToday?'<button onclick="sendRpeReminderAll(this)" style="width:calc(100% - 32px);margin:8px 16px 0;padding:11px;background:rgba(59,130,246,0.1);border:1px solid var(--blue);color:#93c5fd;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600">📨 미응답 전원에게 발송</button>':'')
      +'</div>':'');
  window._rpeNoResp=noResp.map(p=>p.id);
}

        <button id="mrpe-del" onclick="mobileDeleteRpeMod()" style="flex:1;padding:13px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#ef4444;border-radius:10px;font-size:13px;font-family:inherit;cursor:pointer">삭제</button>
        <button onclick="mobileCloseRpeModal()" style="flex:1;padding:13px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:10px;font-size:13px;font-family:inherit;cursor:pointer">취소</button>

  document.getElementById('mrpe-title').textContent=id?name+' RPE 수정':name+' RPE 추가';

function mobileRpeSess(sess){
  if(!window._mRpeOpts) return;
  window._mRpeOpts.sess=sess;
  const am=document.getElementById('mrpe-am'),pm=document.getElementById('mrpe-pm');
  if(!am||!pm) return;
  am.style.background=sess==='AM'?'var(--accent2)':'var(--surface2)';am.style.color=sess==='AM'?'#fff':'var(--text)';
  pm.style.background=sess==='PM'?'var(--accent2)':'var(--surface2)';pm.style.color=sess==='PM'?'#fff':'var(--text)';
}
function mobileCloseRpeModal(){
  const m=document.getElementById('mobile-rpe-modal');
  if(m) m.style.display='none';
}
async function mobileSaveRpe(){
  const opts=window._mRpeOpts||{};
  const date=document.getElementById('mrpe-date').value;
  const val=parseFloat(document.getElementById('mrpe-val').value);
  const sess=opts.sess||'AM';
  if(!date){showToast('날짜를 입력하세요',true);return;}
  if(isNaN(val)||val<1||val>10){showToast('RPE는 1~10 사이로 입력하세요',true);return;}
  let error;
  if(opts.id){
    ({error}=await supa.from('session_records').update({rpe:val,session_type:sess,session_order:sess==='AM'?1:2,record_date:date}).eq('id',opts.id));
  } else {
    ({error}=await supa.from('session_records').insert({player_id:opts.playerId,record_date:date,rpe:val,session_type:sess,session_order:sess==='AM'?1:2}));
  }
  if(error){showToast('저장 실패',true);return;}
  showToast('✅ 저장됨');
  mobileCloseRpeModal();
  await syncRpeDurationsForDate(date);
  _loadedPages['rpe']=false;loadRpe();
}
async function syncRpeDurationsForDate(date){
  const {data:rpeRecs}=await supa.from('session_records').select('id,player_id,rpe,duration,session_type').eq('record_date',date);
  const needSync=(rpeRecs||[]).filter(r=>!r.duration&&parseFloat(r.rpe)>0);
  if(!needSync.length) return;
  const pids=[...new Set(needSync.map(r=>r.player_id))];
  const {data:gpsRecs}=await supa.from('gps_records').select('player_id,session_label,duration').eq('session_date',date).in('player_id',pids);
  for(const rec of needSync){
    const pg=(gpsRecs||[]).filter(g=>g.player_id===rec.player_id&&parseFloat(g.duration)>0);
    if(!pg.length) continue;
    const sess=(rec.session_type||'AM').trim().toUpperCase();
    let g=pg.find(g=>(g.session_label||'').trim().toUpperCase()===sess);
    if(!g&&pg.length===1) g=pg[0];
    if(!g) g=pg[0];
    if(g?.duration) await supa.from('session_records').update({duration:parseFloat(g.duration)}).eq('id',rec.id);
  }
}
async function mobileDeleteRpeMod(){
  const opts=window._mRpeOpts||{};
  if(!opts.id) return;
  if(!confirm(opts.name+' ('+opts.sess+') RPE 기록을 삭제할까요?')) return;
  const {error}=await supa.from('session_records').delete().eq('id',opts.id);
  if(error){showToast('삭제 실패',true);return;}
  showToast('✅ 삭제됨');
  mobileCloseRpeModal();
  _loadedPages['rpe']=false;loadRpe();
}

// 4. 훈련 — 이번 주 부하 흐름 + 2주 세션 현황
// ══════════════════════════════════════════════════════
async function loadTraining(){
  const el=document.getElementById('training-content');
  el.innerHTML='<div class="loading"><span class="spinner">⏳</span> 로딩 중...</div>';
  const today=getKSTDateStr();
  const now=kst();

  // 이번주 월요일
  const weekStart=new Date(now);
  const dow=weekStart.getDay();
  weekStart.setDate(weekStart.getDate()-(dow===0?6:dow-1));
  const weekStartStr=weekStart.toISOString().split('T')[0];

  // 14일 전
  const since14=new Date(now); since14.setDate(now.getDate()-13);
  const since14Str=since14.toISOString().split('T')[0];

  // 28일 전 (ACWR)
  const since28=new Date(now); since28.setDate(now.getDate()-28);
  const since28Str=since28.toISOString().split('T')[0];

  // 병렬 데이터 조회
  const [{data:gps14},{data:rpe28},{data:matchFT}]=await Promise.all([
    supa.from('gps_records')
      .select('session_date,player_id,td,running_high,sprint,accel,rhie,duration,session_type2,session_topic,opponent')
      .gte('session_date',since14Str).lte('session_date',today)
      .order('session_date',{ascending:true}),
    supa.from('session_records')
      .select('player_id,record_date,rpe,duration')
      .gte('record_date',since28Str),
    supa.from('match_records')
      .select('match_date,opponent,home_away,player_id,duration,td,band4_td,band5_td,accel,rhie,result,score')
      .eq('time_type','FT')
      .order('match_date',{ascending:false})
      .limit(300),
  ]);

  // ── 헬퍼 ──────────────────────────────────────────
  // 팀 평균: (총합/시간합)×최빈시간 — 데일리 브리핑과 동일 공식
  const trainAvg=(arr,field)=>{
    const vrs=arr.filter(r=>parseFloat(r[field])>0&&parseFloat(r.duration)>0);
    if(!vrs.length) return null;
    const dc={};
    vrs.forEach(r=>{const d=Math.round(parseFloat(r.duration));dc[d]=(dc[d]||0)+1;});
    const mDur=parseFloat(Object.entries(dc).sort((a,b)=>b[1]-a[1]||parseFloat(b[0])-parseFloat(a[0]))[0][0]);
    const sv=vrs.reduce((a,r)=>a+(parseFloat(r[field])||0),0);
    const sd=vrs.reduce((a,r)=>a+(parseFloat(r.duration)||0),0);
    return sd>0?sv/sd*mDur:null;
  };

  // 경기 팀 평균: (총합/출전시간합)×max출전시간
  const matchAvg=(arr,field)=>{
    const vrs=arr.filter(r=>parseFloat(r[field])>0&&parseFloat(r.duration)>0);
    if(!vrs.length) return null;
    const maxDur=Math.max(...vrs.map(r=>parseFloat(r.duration)));
    return vrs.reduce((a,r)=>a+(parseFloat(r[field])||0),0)/vrs.reduce((a,r)=>a+(parseFloat(r.duration)||0),0)*maxDur;
  };

  const acwrColor=v=>!v?'var(--text3)':v>1.5?'#ef4444':v>1.3?'#f59e0b':v<0.8?'#eab308':'#22c55e';
  const acwrLabel=v=>!v?'—':v>1.5?'고위험':v>1.3?'주의':v<0.8?'과소부하':'안전';

  // RPE 맵 (ACWR 계산용)
  const plRpe={};
  (rpe28||[]).forEach(r=>{
    if(!plRpe[r.player_id]) plRpe[r.player_id]=[];
    plRpe[r.player_id].push({date:r.record_date,rpe:parseFloat(r.rpe)||0,dur:parseFloat(r.duration)||0});
  });

  const calcDayACWR=dateStr=>{
    const dateD=new Date(dateStr);
    const acwrs=Object.values(plRpe).map(sess=>{
      let a=0,c=0;
      sess.forEach(s=>{
        const diff=Math.floor((dateD-new Date(s.date))/86400000);
        const sr=s.rpe*s.dur;
        if(diff>=0&&diff<7) a+=sr;
        if(diff>=0&&diff<28) c+=sr;
      });
      const chr=(c/28)*7;
      return chr>0?a/chr:null;
    }).filter(v=>v!==null);
    return acwrs.length?acwrs.reduce((a,b)=>a+b,0)/acwrs.length:null;
  };

  // 최근 3경기 기준선
  const mKeys3=[...new Set((matchFT||[]).map(r=>r.match_date+'__'+r.opponent))]
    .sort((a,b)=>b.localeCompare(a)).slice(0,3);
  const mRows3=(matchFT||[]).filter(r=>mKeys3.includes(r.match_date+'__'+r.opponent));
  const matchRef={
    td:    matchAvg(mRows3,'td'),
    hsr:   matchAvg(mRows3,'band4_td'),
    sp:    matchAvg(mRows3,'band5_td'),
    accel: matchAvg(mRows3,'accel'),
    rhie:  matchAvg(mRows3,'rhie'),
  };
  const pct=(val,ref)=>{
    if(!val||!ref) return '';
    const p=Math.round(val/ref*100);
    const c=p>=80?'#22c55e':p>=60?'#eab308':'#ef4444';
    return ` <span style="font-size:9px;color:${c}">${p}%</span>`;
  };

  // 이번주 경기 데이터 맵
  const weekMatchByDate={};
  (matchFT||[]).forEach(r=>{
    if(r.match_date>=weekStartStr&&r.match_date<=today){
      if(!weekMatchByDate[r.match_date]) weekMatchByDate[r.match_date]=[];
      weekMatchByDate[r.match_date].push(r);
    }
  });

  // MD 배지 스타일
  const mdStyle=topic=>{
    if(!topic) return '';
    const t=topic.toUpperCase();
    if(t.includes('MATCH')) return 'color:#f87171';
    if(t.includes('MD-3'))  return 'color:#f87171';
    if(t.includes('MD-4'))  return 'color:#60a5fa';
    if(t.includes('MD-2'))  return 'color:#fbbf24';
    if(t.includes('MD-1'))  return 'color:#4ade80';
    if(t.includes('MD+1'))  return 'color:#9ca3af';
    return 'color:var(--text2)';
  };

  // ══ 섹션1: 이번 주 팀 부하 흐름 ══════════════════
  const weekDays=[];
  for(let d=new Date(weekStart);d<=now;d.setDate(d.getDate()+1))
    weekDays.push(d.toISOString().split('T')[0]);
  // 이번주 남은 날 (예정)
  const daysLeft=6-now.getDay();
  for(let i=1;i<=daysLeft;i++){
    const fd=new Date(now); fd.setDate(now.getDate()+i);
    weekDays.push(fd.toISOString().split('T')[0]);
  }

  let wTD=0,wHSR=0,wSP=0,wSRPE=0;

  const weekRows=weekDays.slice(0,7).map(date=>{
    const d=new Date(date+'T12:00:00');
    const isPast=date<=today;
    const isToday=date===today;
    const dayM=(gps14||[]).filter(r=>r.session_date===date&&(r.session_type2||'').trim().toUpperCase()==='M');
    const dayS=(gps14||[]).filter(r=>r.session_date===date&&(r.session_type2||'').trim().toUpperCase()==='S');
    const isTeamDay=dayM.length>0;
    const dayBase=isTeamDay?dayM:(dayS.length?dayS:[]);
    const topic=(gps14||[]).find(r=>r.session_date===date)?.session_topic||null;

    const td=dayBase.length?trainAvg(dayBase,'td'):null;
    const hsr=dayBase.length?trainAvg(dayBase,'running_high'):null;
    const sp=dayBase.length?trainAvg(dayBase,'sprint'):null;
    const dayRpe=(rpe28||[]).filter(r=>r.record_date===date&&parseFloat(r.rpe)>0);
    const rpeAvg=dayRpe.length?dayRpe.reduce((a,r)=>a+parseFloat(r.rpe),0)/dayRpe.length:null;
    const durAvg=dayBase.length?dayBase.filter(r=>parseFloat(r.duration)>0).reduce((a,r,_,arr)=>a+parseFloat(r.duration)/arr.length,0)||null:null;
    const sRPE=(rpeAvg&&durAvg)?Math.round(rpeAvg*durAvg):null;
    const dayACWR=isPast&&dayBase.length?calcDayACWR(date):null;

    if(td) wTD+=td;
    if(hsr) wHSR+=hsr;
    if(sp) wSP+=sp;
    if(sRPE) wSRPE+=sRPE;

    const dc=d.getDay()===0?'#f87171':d.getDay()===6?'#93c5fd':'var(--text2)';
    const typeTag=isPast&&dayBase.length
      ?(isTeamDay?'<span style="font-size:9px;padding:1px 3px;border-radius:3px;background:#0c1a2e;color:#60a5fa;font-weight:700;margin-left:3px">M</span>'
                 :'<span style="font-size:9px;padding:1px 3px;border-radius:3px;background:#1a1a2e;color:#9ca3af;font-weight:700;margin-left:3px">S</span>')
      :'';
    const mdCell=topic?`<span style="font-size:10px;font-weight:600;${mdStyle(topic)}">${topic}</span>`
                      :`<span style="color:var(--text3);font-size:10px">—</span>`;
    const rowBg=isToday?'background:#0a1f10':'';

    // 경기 행
    const dayMatchRows=weekMatchByDate[date]||[];
    const matchRow=(dayMatchRows.length&&isPast)?`<tr style="background:#1a0a0a;border-bottom:.5px solid var(--border)">
      <td colspan="2" style="padding:4px 8px;font-size:10px;color:#f87171;font-weight:600">🏟️ vs ${dayMatchRows[0]?.opponent||''}
        <span style="font-size:9px;color:var(--text3)">${dayMatchRows[0]?.result==='W'?'승':dayMatchRows[0]?.result==='L'?'패':'무'} ${dayMatchRows[0]?.score||''}</span>
      </td>
      <td style="padding:4px 6px;text-align:right;font-size:10px;color:#60a5fa">${matchAvg(dayMatchRows,'td')?((matchAvg(dayMatchRows,'td')/1000).toFixed(1)+'k'):'—'}</td>
      <td style="padding:4px 6px;text-align:right;font-size:10px;color:#f59e0b">${matchAvg(dayMatchRows,'band4_td')?Math.round(matchAvg(dayMatchRows,'band4_td')):'—'}</td>
      <td style="padding:4px 6px;text-align:right;font-size:10px;color:#ef4444">${matchAvg(dayMatchRows,'band5_td')?Math.round(matchAvg(dayMatchRows,'band5_td')):'—'}</td>
      <td style="padding:4px 6px;text-align:right;font-size:10px;color:var(--text3)">—</td>
      <td style="padding:4px 6px;text-align:right;font-size:10px;color:${acwrColor(dayACWR)}">${dayACWR?dayACWR.toFixed(2):'-'}</td>
    </tr>`:'';

    const trainRow=`<tr style="${rowBg};border-bottom:.5px solid var(--border);${!isPast?'opacity:.4':''}">
      <td style="padding:5px 8px;white-space:nowrap">
        <span style="color:${dc};font-weight:${isToday?700:400}">${DOW[d.getDay()]} ${d.getDate()}</span>
        ${isToday?' <span style="font-size:9px;color:#4ade80">오늘</span>':''}${typeTag}
      </td>
      <td style="padding:5px 4px">${mdCell}</td>
      <td style="padding:5px 4px;text-align:right;color:#60a5fa;font-size:11px">${td?((td/1000).toFixed(1)+'k')+pct(td,matchRef.td):'—'}</td>
      <td style="padding:5px 4px;text-align:right;color:#f59e0b;font-size:11px">${hsr?Math.round(hsr)+pct(hsr,matchRef.hsr):'—'}</td>
      <td style="padding:5px 4px;text-align:right;color:#ef4444;font-size:11px">${sp?Math.round(sp)+pct(sp,matchRef.sp):'—'}</td>
      <td style="padding:5px 4px;text-align:right;color:#a78bfa;font-size:11px">${sRPE||'—'}</td>
      <td style="padding:5px 4px;text-align:right;font-size:10px;color:${acwrColor(dayACWR)}">${dayACWR?dayACWR.toFixed(2):(!isPast?'<span style="color:var(--text3)">예정</span>':'—')}</td>
    </tr>`;
    return matchRow+trainRow;
  }).join('');

  // 최근 3경기 기준선 칩
  const ref3Html=mKeys3.length?`
    <div style="margin-top:8px;padding:8px;background:var(--surface2);border-radius:8px;font-size:10px">
      <div style="font-weight:600;color:var(--text3);margin-bottom:5px">📊 % 기준: 최근 ${mKeys3.length}경기 팀 평균</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px">
        ${mKeys3.map((k,i)=>{
          const [md,mo]=k.split('__');
          const r0=(matchFT||[]).find(r=>r.match_date===md&&r.opponent===mo)||{};
          const dd=new Date(md);
          return `<span style="background:#3b1219;color:#f87171;padding:2px 6px;border-radius:8px;font-size:9px">${i+1}. ${dd.getMonth()+1}/${dd.getDate()} vs ${mo} ${r0.result==='W'?'승':r0.result==='L'?'패':r0.result==='D'?'무':''} ${r0.score||''}</span>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;color:var(--text3)">
        ${matchRef.td?`<span>TD <strong style="color:#60a5fa">${(matchRef.td/1000).toFixed(1)}km</strong></span>`:''}
        ${matchRef.hsr?`<span>HSR <strong style="color:#f59e0b">${Math.round(matchRef.hsr)}m</strong></span>`:''}
        ${matchRef.sp?`<span>Sprint <strong style="color:#ef4444">${Math.round(matchRef.sp)}m</strong></span>`:''}
      </div>
      <div style="margin-top:3px;color:var(--text3)">🟢 ≥80% &nbsp; 🟡 60~79% &nbsp; 🔴 &lt;60%</div>
    </div>`:''
  ;

  // ══ 섹션2: 최근 2주 세션 현황 ═════════════════════
  const days14=[];
  for(let i=13;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);days14.push(d.toISOString().split('T')[0]);}

  let t14TD=0,t14HSR=0,t14SP=0,t14SRPE=0;
  const rows14=days14.map(ds=>{
    const d=new Date(ds+'T12:00:00');
    const isT=ds===today;
    const dc=d.getDay()===0?'#f87171':d.getDay()===6?'#93c5fd':'var(--text2)';
    const dayAll=(gps14||[]).filter(r=>r.session_date===ds);
    const mGps=dayAll.filter(r=>(r.session_type2||'').trim().toUpperCase()==='M');
    const dayMatch=(matchFT||[]).filter(r=>r.match_date===ds);
    const hasMatch=dayMatch.length>0;
    const typeTag=hasMatch
      ?'<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:#3b1219;color:#f87171;font-weight:700;margin-left:3px">경기</span>'
      :mGps.length
        ?'<span style="font-size:9px;padding:1px 3px;border-radius:3px;background:#0c1a2e;color:#60a5fa;font-weight:700;margin-left:3px">M</span>'
        :dayAll.length
          ?'<span style="font-size:9px;padding:1px 3px;border-radius:3px;background:#1a2a1a;color:#4ade80;font-weight:700;margin-left:3px">S</span>'
          :'';
    const dateCell=`<td style="padding:5px 8px"><span style="color:${dc}">${DOW[d.getDay()]} ${d.getDate()}</span>${isT?' <span style="font-size:9px;color:#4ade80">오늘</span>':''}${typeTag}</td>`;
    const acwr=calcDayACWR(ds);

    // display: 화면에 표시할 문자열, raw: 단위 원시값(m), ref: 기준값(m)
    // "/" 위치를 열 중앙에 고정: [값 우정렬 | / | % 좌정렬]
    const td2=(display,raw,cl,ref)=>{
      const p=raw&&ref?Math.round(raw/ref*100):null;
      const pc=p!==null?(p>=80?'#22c55e':p>=60?'#eab308':'#ef4444'):null;
      if(!display) return `<td style="padding:4px 3px;text-align:center;color:var(--text3)">—</td>`;
      return `<td style="padding:4px 2px;vertical-align:middle">
        <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1px">
          <span style="text-align:right;color:${cl};font-size:10px;font-weight:600">${display}</span>
          <span style="color:var(--text3);font-size:9px;padding:0 2px">${pc!==null?'/':''}</span>
          <span style="text-align:left;font-size:9px;color:${pc||'transparent'}">${pc!==null?p+'%':''}</span>
        </div>
      </td>`;
    };

    // 경기 날 → match_records 데이터 표시
    if(hasMatch){
      const tdV=matchAvg(dayMatch,'td');
      const hsrV=matchAvg(dayMatch,'band4_td');
      const spV=matchAvg(dayMatch,'band5_td');
      if(tdV) t14TD+=tdV;
      if(hsrV) t14HSR+=hsrV;
      if(spV) t14SP+=spV;
      const accelV=matchAvg(dayMatch,'accel');
      const rhieV=matchAvg(dayMatch,'rhie');
      return `<tr${isT?' class="today-row"':''} style="border-bottom:.5px solid var(--border);background:#1a0505">
        ${dateCell}
        ${td2(tdV?(tdV/1000).toFixed(1):null, tdV, '#60a5fa', matchRef.td)}
        ${td2(hsrV?Math.round(hsrV):null, hsrV, '#f59e0b', matchRef.hsr)}
        ${td2(spV?Math.round(spV):null, spV, '#ef4444', matchRef.sp)}
        ${td2(accelV?Math.round(accelV):null, accelV, '#34d399', matchRef.accel)}
        ${td2(rhieV?Math.round(rhieV):null, rhieV, '#f472b6', matchRef.rhie)}
        <td style="padding:4px 3px;text-align:right;color:#a78bfa;font-size:10px">—</td>
        <td style="padding:4px 3px;text-align:right;font-size:10px;color:${acwrColor(acwr)};font-weight:500">${acwr?acwr.toFixed(2):'—'}</td>
      </tr>`;
    }

    // 훈련 날 → GPS 데이터 표시
    const useGps=mGps.length?mGps:dayAll;
    if(!useGps.length) return `<tr${isT?' class="today-row"':''}>${dateCell}<td colspan="7" style="color:var(--text3);text-align:center">—</td></tr>`;
    const tdV=trainAvg(useGps,'td');
    const hsrV=trainAvg(useGps,'running_high');
    const spV=trainAvg(useGps,'sprint');
    const accelV=trainAvg(useGps,'accel');
    const rhieV=trainAvg(useGps,'rhie');
    const dayRpe=(rpe28||[]).filter(r=>r.record_date===ds&&parseFloat(r.rpe)>0);
    const rpeAvg=dayRpe.length?dayRpe.reduce((a,r)=>a+parseFloat(r.rpe),0)/dayRpe.length:null;
    const durAvg=useGps.filter(r=>parseFloat(r.duration)>0).reduce((a,r,_,arr)=>a+parseFloat(r.duration)/arr.length,0)||null;
    const sRPE=(rpeAvg&&durAvg)?Math.round(rpeAvg*durAvg):null;
    if(tdV) t14TD+=tdV;
    if(hsrV) t14HSR+=hsrV;
    if(spV) t14SP+=spV;
    if(sRPE) t14SRPE+=sRPE;
    return `<tr${isT?' class="today-row"':''} style="border-bottom:.5px solid var(--border)">
      ${dateCell}
      ${td2(tdV?(tdV/1000).toFixed(1):null, tdV, '#60a5fa', matchRef.td)}
      ${td2(hsrV?Math.round(hsrV):null, hsrV, '#f59e0b', matchRef.hsr)}
      ${td2(spV?Math.round(spV):null, spV, '#ef4444', matchRef.sp)}
      ${td2(accelV?Math.round(accelV):null, accelV, '#34d399', matchRef.accel)}
      ${td2(rhieV?Math.round(rhieV):null, rhieV, '#f472b6', matchRef.rhie)}
      <td style="padding:4px 3px;text-align:right;color:#a78bfa;font-size:10px">${sRPE||'—'}</td>
      <td style="padding:4px 3px;text-align:right;font-size:10px;color:${acwrColor(acwr)};font-weight:500">${acwr?acwr.toFixed(2):'—'}</td>
    </tr>`;
  }).join('');

  // ══ 렌더링 ══════════════════════════════════════════
  el.innerHTML=`
    <div style="padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;font-weight:600;color:var(--text)">이번 주 팀 부하 흐름</div>
      <button class="refresh-btn" onclick="_loadedPages['training']=false;loadTraining()">🔄</button>
    </div>

    <!-- 이번 주 합계 카드 -->
    <div class="card"><div class="card-title">📊 이번 주 합계</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
        <div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:10px;color:var(--text3)">TD</div>
          <div style="font-size:14px;font-weight:600;color:#60a5fa">${(wTD/1000).toFixed(1)}<span style="font-size:9px;color:var(--text3)">km</span></div>
        </div>
        <div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:10px;color:var(--text3)">HSR</div>
          <div style="font-size:14px;font-weight:600;color:#f59e0b">${Math.round(wHSR).toLocaleString()}<span style="font-size:9px;color:var(--text3)">m</span></div>
        </div>
        <div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:10px;color:var(--text3)">Sprint</div>
          <div style="font-size:14px;font-weight:600;color:#ef4444">${Math.round(wSP).toLocaleString()}<span style="font-size:9px;color:var(--text3)">m</span></div>
        </div>
        <div style="background:var(--surface2);border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:10px;color:var(--text3)">sRPE</div>
          <div style="font-size:14px;font-weight:600;color:#a78bfa">${Math.round(wSRPE).toLocaleString()}</div>
        </div>
      </div>
    </div>

    <!-- 2주 세션 현황 -->
    <div style="padding:12px 16px 4px">
      <div style="font-size:13px;font-weight:600;color:var(--text)">최근 2주 세션 현황</div>
    </div>

    <!-- 2주 날짜별 테이블 -->
    <div class="card" style="padding:12px 0">
      <div style="overflow-x:auto;padding:0 8px">
        <table class="data-table" style="min-width:560px">
          <thead><tr>
            <th style="min-width:64px">날짜</th>
            <th style="color:#60a5fa;min-width:72px">TD<br><span style="font-size:9px">(km)</span></th>
            <th style="color:#f59e0b;min-width:72px">HSR<br><span style="font-size:9px">(m)</span></th>
            <th style="color:#ef4444;min-width:72px">Sprint<br><span style="font-size:9px">(m)</span></th>
            <th style="color:#34d399;min-width:68px">가속<br><span style="font-size:9px">(회)</span></th>
            <th style="color:#f472b6;min-width:60px">RHIE<br><span style="font-size:9px">(회)</span></th>
            <th style="color:#a78bfa;min-width:40px">sRPE</th>
            <th style="min-width:38px">ACWR</th>
          </tr></thead><tbody>${rows14}</tbody></table>
      </div>
      ${ref3Html}
    </div>
  `;
}

// ══════════════════════════════════════════════════════
// 5. 알림 / 채팅
// ══════════════════════════════════════════════════════
function switchNotifyTab(tab){
  document.getElementById('notify-announce').style.display=tab==='announce'?'block':'none';
  document.getElementById('notify-chat').style.display=tab==='chat'?'block':'none';
  document.getElementById('stab-announce').className='sub-tab'+(tab==='announce'?' active':'');
  document.getElementById('stab-chat').className='sub-tab'+(tab==='chat'?' active':'');
  if(tab==='chat') loadChatList();
}

async function sendAnnouncement(){
  const title=document.getElementById('announce-title').value.trim();
  const body=document.getElementById('announce-body').value.trim();
  if(!title||!body){showToast('제목과 내용을 입력하세요',true);return;}
  const btn=document.getElementById('announce-btn');
  btn.disabled=true;btn.textContent='발송 중...';
  try{
    await supa.from('notifications').insert(_players.map(p=>({title,body,target_type:'player',target_value:p.id,created_by:currentUser?.email||'coach'})));
    showToast('✅ 전체 '+_players.length+'명에게 공지 발송');
    document.getElementById('announce-title').value='';
    document.getElementById('announce-body').value='';
  }catch(e){showToast('발송 실패: '+e.message,true);}
  finally{btn.disabled=false;btn.textContent='📢 전체 발송';}
}

async function loadChatList(){
  const el=document.getElementById('chat-list-content');
  el.innerHTML='<div class="loading"><span class="spinner">⏳</span></div>';
  let msgs=[];
  try{
    const {data}=await supa.from('messages').select('player_id,sender,content,created_at,is_read').order('created_at',{ascending:false});
    msgs=data||[];
  }catch(e){
    el.innerHTML='<div style="font-size:12px;color:var(--text3);text-align:center;padding:20px">채팅 기능을 사용하려면 messages 테이블을 먼저 생성해주세요</div>';
    return;
  }
  const lastMsg={},unread={};
  msgs.forEach(m=>{
    if(!lastMsg[m.player_id]) lastMsg[m.player_id]=m;
    if(m.sender==='player'&&!m.is_read) unread[m.player_id]=(unread[m.player_id]||0)+1;
  });
  const withMsg=_players.filter(p=>lastMsg[p.id]).sort((a,b)=>new Date(lastMsg[b.id].created_at)-new Date(lastMsg[a.id].created_at));
  const noMsg=_players.filter(p=>!lastMsg[p.id]);
  const sorted=[...withMsg,...noMsg];
  const tStr=iso=>{const d=new Date(iso);return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(/\. /g,'.').replace(/\.$/, '');};
  el.innerHTML=sorted.map(p=>{
    const last=lastMsg[p.id];const uc=unread[p.id]||0;
    return '<div class="chat-list-item" onclick="openChatThread(\''+p.id+'\',\''+p.name+'\',\''+( p.position||'')+'\')">'
      +'<div class="chat-avatar">'+p.name.slice(0,1)+'</div>'
      +'<div class="chat-info"><div class="chat-name">'+p.name+' <span style="font-size:10px;color:var(--text3)">'+(p.position||'')+'</span></div>'
      +'<div class="chat-preview">'+(last?(last.sender==='coach'?'나: ':'')+last.content:'대화 없음')+'</div></div>'
      +'<div class="chat-meta">'+(last?'<span class="chat-time">'+tStr(last.created_at)+'</span>':'')
      +(uc?'<span class="unread-badge">'+uc+'</span>':'')+'</div></div>';
  }).join('');
}

async function openChatThread(playerId,playerName,playerPos){
  _currentChatPlayerId=playerId;
  document.getElementById('chat-thread-name').textContent=playerName;
  document.getElementById('chat-thread-pos').textContent=playerPos||'';
  document.getElementById('chat-thread-overlay').classList.add('open');
  document.getElementById('chat-input').focus();
  await loadChatMessages(playerId);
  supa.from('messages').update({is_read:true}).eq('player_id',playerId).eq('sender','player').eq('is_read',false).then(()=>{});
  if(_chatSub) supa.removeChannel(_chatSub);
  _chatSub=supa.channel('chat-'+playerId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'player_id=eq.'+playerId},()=>loadChatMessages(playerId))
    .subscribe();
}

async function loadChatMessages(playerId){
  const el=document.getElementById('chat-thread-messages');
  const {data:msgs}=await supa.from('messages').select('*').eq('player_id',playerId).order('created_at',{ascending:true});
  if(!msgs||!msgs.length){
    el.innerHTML='<div style="text-align:center;color:var(--text3);font-size:13px;margin-top:60px">아직 대화가 없어요<br><span style="font-size:11px">메시지를 먼저 보내보세요</span></div>';
    return;
  }
  const tStr=iso=>{const d=new Date(iso);return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(/\. /g,'.').replace(/\.$/, '');};
  el.innerHTML=msgs.map(m=>{
    const isC=m.sender==='coach';
    return '<div class="msg-wrap-'+(isC?'coach':'player')+'">'
      +'<div class="msg-bubble msg-'+(isC?'coach':'player')+'">'+escHtml(m.content)+'</div>'
      +(isC&&m.is_read?'<div class="msg-read">읽음</div>':'')
      +'<div class="msg-time">'+tStr(m.created_at)+'</div></div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendChatMsg(){
  const input=document.getElementById('chat-input');
  const content=input.value.trim();
  if(!content||!_currentChatPlayerId) return;
  input.value='';
  const btn=document.querySelector('.chat-send-btn');
  if(btn) btn.disabled=true;
  try{
    const {error}=await supa.from('messages').insert({
      player_id:_currentChatPlayerId,
      sender:'coach',
      content,
      is_read:false
    });
    if(error) throw error;
    // 전송 후 즉시 화면 갱신 (realtime 미지원 환경 대비)
    await loadChatMessages(_currentChatPlayerId);
  }catch(e){
    input.value=content; // 실패 시 텍스트 복원
    showToast('전송 실패: '+e.message,true);
  }finally{
    if(btn) btn.disabled=false;
  }
  // notifications는 별도로 (실패해도 채팅에 영향 없음)
  supa.from('notifications').insert({
    title:'코치 메시지',body:content,
    target_type:'player',target_value:_currentChatPlayerId,
    created_by:currentUser?.email||'coach'
  }).then(()=>{}).catch(()=>{});
}

function closeChatThread(){
  document.getElementById('chat-thread-overlay').classList.remove('open');
  if(_chatSub){supa.removeChannel(_chatSub);_chatSub=null;}
  _currentChatPlayerId=null;
  loadChatList();
}

async function loadTrainingPlayer(el){
  el=el||document.getElementById('training-content');
  el.innerHTML='<div class="loading"><span class="spinner">⏳</span> 로딩 중...</div>';
  const now=kst();
  const dow=now.getDay();
  const thisMon=new Date(now);
  thisMon.setDate(now.getDate()-(dow===0?6:dow-1));
  thisMon.setHours(0,0,0,0);
  const thisMonStr=thisMon.toISOString().split('T')[0];
  const today=getKSTDateStr();
  const since28=new Date(now);since28.setDate(now.getDate()-28);
  const since28Str=since28.toISOString().split('T')[0];
  const [{data:rpe28},{data:gpsWeek}]=await Promise.all([
    supa.from('session_records').select('player_id,record_date,rpe,duration').gte('record_date',since28Str).lte('record_date',today),
    supa.from('gps_records').select('player_id,session_date,td,duration,session_type2').gte('session_date',thisMonStr).lte('session_date',today),
  ]);
  const playerData=_players.map(p=>{
    const allSess=(rpe28||[]).filter(r=>r.player_id===p.id)
      .map(r=>({date:r.record_date,rpe:parseFloat(r.rpe)||0,dur:parseFloat(r.duration)||0}));
    const acwrData=calcACWR(allSess,today);
    const weekSess=(rpe28||[]).filter(r=>r.player_id===p.id&&r.record_date>=thisMonStr&&parseFloat(r.rpe)>0);
    const weekSRPE=Math.round(weekSess.reduce((s,r)=>{const rv=parseFloat(r.rpe)||0,dur=parseFloat(r.duration)||0;return s+rv*dur;},0));
    const pgps=(gpsWeek||[]).filter(r=>r.player_id===p.id);
    const pgpsM=pgps.filter(r=>(r.session_type2||'').trim().toUpperCase()==='M');
    const useGps=pgpsM.length?pgpsM:pgps;
    const weekDays=[...new Set(useGps.map(r=>r.session_date))];
    let weekTD=0;
    weekDays.forEach(ds=>{
      const dg=useGps.filter(r=>r.session_date===ds);
      const sumDur=dg.reduce((a,r)=>a+(parseFloat(r.duration)||0),0);
      const maxDur=Math.max(...dg.map(r=>parseFloat(r.duration)||0));
      weekTD+=sumDur>0?dg.reduce((a,r)=>a+(parseFloat(r.td)||0),0)/sumDur*maxDur:0;
    });
    const trainDays=new Set(weekSess.map(r=>r.record_date)).size;
    return{player:p,acwr:acwrData.acwr,weekSRPE,weekTD,trainDays};
  }).sort((a,b)=>(b.acwr||0)-(a.acwr||0));
  const ac=v=>!v?'var(--text3)':v>1.5?'#ef4444':v>1.3?'#f59e0b':v<0.8?'#eab308':'#22c55e';
  const acLbl=v=>{
    if(!v)return '<span style="color:var(--text3)">—</span>';
    const lbl=v>1.5?'⚠️고위험':v>1.3?'주의':v<0.8?'과소':'정상';
    return '<span style="color:'+ac(v)+';font-weight:600">'+v.toFixed(2)+'</span><span style="font-size:9px;color:'+ac(v)+';margin-left:3px">'+lbl+'</span>';
  };
  const rows=playerData.map(d=>'<tr onclick="showPlayerDetail(\''+d.player.id+'\')">'
    +'<td><div style="font-size:12px;font-weight:500">'+d.player.name+'</div><div style="font-size:10px;color:var(--text3)">'+(d.player.position||'—')+'</div></td>'
    +'<td>'+acLbl(d.acwr)+'</td>'
    +'<td style="color:#a78bfa;font-weight:600">'+(d.weekSRPE||'—')+'</td>'
    +'<td style="color:#60a5fa">'+(d.weekTD>0?d.weekTD.toFixed(1):'—')+'</td>'
    +'<td style="color:var(--text3)">'+d.trainDays+'</td></tr>').join('');
  el.innerHTML=
    '<div style="padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:center">'
    +'<div style="font-size:13px;color:var(--text3)">'+thisMonStr.slice(5).replace('-','/')+' ~ '+today.slice(5).replace('-','/')+' 개인별</div>'
    +'<button class="refresh-btn" onclick="loadTrainingPlayer()">🔄</button></div>'
    +'<div class="card" style="padding:12px 0">'
    +'<div class="card-title" style="padding:0 16px 8px">🏃 선수별 이번 주 부하 <span style="font-size:11px;font-weight:400;color:var(--text3)">ACWR 높은 순</span></div>'

    +'<tbody>'+rows+'</tbody></table></div></div>';
}

  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
