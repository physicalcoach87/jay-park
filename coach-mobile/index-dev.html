// 팀 요약 — 주기화 블록 테이블 + 선수 간 부하 편차 (코치 웹 이식)
async function renderPmTeam(el,mode){
  if(!_players.length){ el.innerHTML='<div class="empty-state"><p>선수 명단 없음 (로그인 필요)</p></div>'; return; }
  const today=getKSTDateStr();
  const {data:blocks}=await supa.from('blocks').select('id,start_date,end_date,context,label,color').order('start_date',{ascending:false});
  const block=(blocks||[]).find(b=>b.start_date<=today&&b.end_date>=today)||null;
  const startD=block?block.start_date:await getMicrocycleStart(today);
  let endD;
  if(block) endD=block.end_date; else { const e=new Date(today+'T12:00:00'); e.setDate(e.getDate()+6); endD=e.toISOString().split('T')[0]; }
  const blockName=block?[block.context,block.label].filter(Boolean).join(' '):'이번 주';
  const [{data:bdays},{data:gps}]=await Promise.all([
    supa.from('block_days').select('plan_date,day_label,am_session,pm_session,td_target,hsr_target,spr_target,acc_target,rhie_target').gte('plan_date',startD).lte('plan_date',endD).order('plan_date',{ascending:true}),
    supa.from('gps_records').select('player_id,session_date,td,running_high,sprint,accel,decel,rhie,duration,session_type2').gte('session_date',startD).lte('session_date',endD),
  ]);
  const mGps=(gps||[]).filter(r=>(r.session_type2||'').trim().toUpperCase()==='M');
  const DOWk=['일','월','화','수','목','금','토'];
  const mdStyle=l=>{l=(l||'').toUpperCase();return l.includes('MATCH')?'background:#3b1219;color:#f87171':(l.includes('MD-1')||l==='D-1')?'background:#0a1f10;color:#4ade80':l.includes('MD+1')?'background:#1a1a1a;color:#9ca3af':'background:#1c1c26;color:#a0a0b8';};
  const dates=(bdays&&bdays.length)?bdays.map(r=>r.plan_date):(()=>{const a=[];let d=new Date(startD+'T12:00:00');const e=new Date(endD+'T12:00:00');while(d<=e){a.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1);}return a;})();
  const bdMap={};(bdays||[]).forEach(r=>bdMap[r.plan_date]=r);
  const dayM=(date,f)=>trainAvgTeam(mGps.filter(r=>r.session_date===date),f);
  const cell=(act,tgt)=>{
    if(tgt==null) return act!=null?'<div style="color:var(--text2)">'+Math.round(act).toLocaleString()+'</div>':'<span style="color:var(--text3)">—</span>';
    if(act==null) return '<span style="color:var(--text3)">—</span><div style="font-size:9px;color:#4ade80">목표 '+Math.round(tgt).toLocaleString()+'</div>';
    if(tgt===0) return '<div style="color:var(--text2)">'+Math.round(act).toLocaleString()+'</div>';
    const pct=Math.round(act/tgt*100);const c=pct>130?'#ef4444':pct>=110?'#f97316':pct>=90?'#22c55e':pct>=70?'#eab308':'#ef4444';
    return '<div style="color:var(--text2)">'+Math.round(act).toLocaleString()+'</div><div style="font-size:9px;font-weight:700"><span style="color:'+c+'">'+pct+'%</span> <span style="color:#4ade80">/'+Math.round(tgt).toLocaleString()+'</span></div>';
  };
  const sum={td:[0,0,false],hsr:[0,0,false],spr:[0,0,false],acc:[0,0,false],rhie:[0,0,false]};
  let trainDays=0;
  const bodyRows=dates.map(date=>{
    const bd=bdMap[date]||{};
    const d=new Date(date+'T12:00:00');const isRest=(bd.day_label||'').toUpperCase()==='REST';
    const aTD=dayM(date,'td'),aHSR=dayM(date,'running_high'),aSPR=dayM(date,'sprint'),aACC=dayM(date,'accel'),aRHIE=dayM(date,'rhie');
    if(!isRest&&aTD!=null)trainDays++;
    const acc=(k,act,tgt)=>{ if(act!=null)sum[k][0]+=act; if(tgt!=null&&!isRest){sum[k][1]+=tgt;sum[k][2]=true;} };
    acc('td',aTD,bd.td_target);acc('hsr',aHSR,bd.hsr_target);acc('spr',aSPR,bd.spr_target);acc('acc',aACC,bd.acc_target);acc('rhie',aRHIE,bd.rhie_target);
    const sess=[bd.am_session,bd.pm_session].filter(Boolean).join(' / ');
    return '<tr>'
      +'<td style="white-space:nowrap"><div style="font-weight:600">'+DOWk[d.getDay()]+' '+(d.getMonth()+1)+'/'+d.getDate()+'</div>'+(sess?'<div style="font-size:9px;color:var(--text3)">'+escHtml(sess)+'</div>':'')+'</td>'
      +'<td style="text-align:center"><span style="font-size:9px;padding:1px 5px;border-radius:4px;'+mdStyle(bd.day_label)+'">'+escHtml(bd.day_label||'—')+'</span></td>'
      +'<td>'+cell(aTD,bd.td_target)+'</td><td>'+cell(aHSR,bd.hsr_target)+'</td><td>'+cell(aSPR,bd.spr_target)+'</td><td>'+cell(aACC,bd.acc_target)+'</td><td>'+cell(aRHIE,bd.rhie_target)+'</td>'
      +'</tr>';
  }).join('');
  const blkCell=s=>{ const [act,tgt,set]=s; if(!set) return act>0?'<span style="font-weight:600">'+Math.round(act).toLocaleString()+'</span>':'—'; const pct=tgt>0?Math.round(act/tgt*100):0; const c=pct>130?'#ef4444':pct>=110?'#f97316':pct>=90?'#22c55e':pct>=70?'#eab308':'#ef4444'; return '<div style="font-weight:700">'+Math.round(act).toLocaleString()+'</div><div style="font-size:9px"><span style="color:'+c+'">'+pct+'%</span> <span style="color:#4ade80">/'+Math.round(tgt).toLocaleString()+'</span></div>'; };
  const blockTable=
    '<div style="font-size:13px;font-weight:700;color:#a5b4fc;margin-bottom:2px">'+escHtml(blockName)+'</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:8px">'+startD+' ~ '+endD+'</div>'
    +'<div style="overflow-x:auto"><table class="data-table" style="font-size:10px;min-width:540px"><thead><tr><th>날짜</th><th style="text-align:center">MD</th><th style="color:#60a5fa">TD(m)</th><th style="color:#f59e0b">HSR</th><th style="color:#ef4444">Sprint</th><th style="color:#fb923c">가속</th><th style="color:#34d399">RHIE</th></tr></thead><tbody>'
    +bodyRows
    +'<tr style="border-top:2px solid var(--border)"><td style="font-weight:700">📊 합계</td><td style="text-align:center;color:var(--text3)">'+trainDays+'일</td><td>'+blkCell(sum.td)+'</td><td>'+blkCell(sum.hsr)+'</td><td>'+blkCell(sum.spr)+'</td><td>'+blkCell(sum.acc)+'</td><td>'+blkCell(sum.rhie)+'</td></tr>'
    +'</tbody></table></div>';

  // ── 선수 간 부하 편차 (M 그룹, 블록 누적) ──
  const pmap={};
  mGps.forEach(r=>{ const id=r.player_id; if(!pmap[id])pmap[id]={td:0,hsr:0,spr:0,acc:0,dec:0,rhie:0,days:new Set()};
    pmap[id].td+=parseFloat(r.td)||0;pmap[id].hsr+=parseFloat(r.running_high)||0;pmap[id].spr+=parseFloat(r.sprint)||0;pmap[id].acc+=parseFloat(r.accel)||0;pmap[id].dec+=parseFloat(r.decel)||0;pmap[id].rhie+=parseFloat(r.rhie)||0;pmap[id].days.add(r.session_date); });
  const plist=Object.entries(pmap).map(([id,v])=>({p:_players.find(x=>x.id===id),...v,days:v.days.size})).filter(x=>x.td>0).sort((a,b)=>b.td-a.td);
  const stat=f=>{const vals=plist.map(x=>x[f]);const n=vals.length;if(!n)return{m:0,sd:0};const m=vals.reduce((a,b)=>a+b,0)/n;const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-m)*(b-m),0)/n);return{m,sd};};
  const sTD=stat('td'),sHSR=stat('hsr'),sSPR=stat('spr'),sACC=stat('acc'),sRHIE=stat('rhie'),sDEC=stat('dec');
  const fmtMS=s=>Math.round(s.m).toLocaleString()+' <span style="font-size:9px;color:var(--text3)">±'+Math.round(s.sd).toLocaleString()+'</span>';
  const devTable=plist.length
    ? '<div style="font-size:13px;font-weight:700;color:#fbbf24;margin:18px 0 4px">📐 선수 간 부하 편차 <span style="font-size:10px;font-weight:400;color:var(--text3)">· M 그룹 '+plist.length+'명</span></div>'
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:8px">그룹 평균 ±SD · TD +%는 평균 대비 · ±1SD 이상 강조</div>'
      +'<div style="overflow-x:auto"><table class="data-table" style="font-size:10px;min-width:540px"><thead><tr><th>선수</th><th>일수</th><th style="color:#60a5fa">TD</th><th style="color:#f59e0b">HSR</th><th style="color:#ef4444">Spr</th><th style="color:#fb923c">가속</th><th style="color:#34d399">RHIE</th><th style="color:#a78bfa">감속</th></tr></thead><tbody>'
      +'<tr style="color:var(--text3)"><td>그룹 평균</td><td>—</td><td>'+fmtMS(sTD)+'</td><td>'+fmtMS(sHSR)+'</td><td>'+fmtMS(sSPR)+'</td><td>'+fmtMS(sACC)+'</td><td>'+fmtMS(sRHIE)+'</td><td>'+fmtMS(sDEC)+'</td></tr>'
      +plist.map(x=>{
        const dev=sTD.m>0?Math.round((x.td-sTD.m)/sTD.m*100):0;
        const over=sTD.sd>0&&Math.abs(x.td-sTD.m)>=sTD.sd;
        const devC=dev>0?'#22c55e':dev<0?'#ef4444':'var(--text3)';
        return '<tr><td><span style="font-weight:600'+(over?';color:'+(dev>0?'#4ade80':'#f87171'):'')+'">'+escHtml((x.p&&x.p.name)||'—')+'</span> <span style="font-size:9px;color:var(--text3)">'+escHtml((x.p&&x.p.position)||'')+'</span></td>'
          +'<td style="color:var(--text3)">'+x.days+'일</td>'
          +'<td style="font-weight:600">'+Math.round(x.td).toLocaleString()+(dev?' <span style="font-size:9px;color:'+devC+'">'+(dev>0?'+':'')+dev+'%</span>':'')+'</td>'
          +'<td>'+Math.round(x.hsr).toLocaleString()+'</td><td>'+Math.round(x.spr).toLocaleString()+'</td><td>'+Math.round(x.acc).toLocaleString()+'</td><td>'+Math.round(x.rhie).toLocaleString()+'</td><td>'+Math.round(x.dec).toLocaleString()+'</td></tr>';
      }).join('')
      +'</tbody></table></div>'
    : '<div class="empty-state" style="margin-top:16px"><p>이 블록 훈련 데이터 없음</p></div>';

  el.innerHTML = mode==='block' ? blockTable : mode==='dev' ? devTable : (blockTable+devTable);
}

// 선수 명단 (조회 + 기본 편집)
async function renderPmRoster(el){
  if(!_players.length){ el.innerHTML='<div class="empty-state"><p>선수 명단 없음 (로그인 필요)</p></div>'; return; }
  const groupOf=pos=>{ const p=(pos||'').toUpperCase();
    if(p.includes('GK')||p.includes('골키퍼')) return 'GK';
    if(/CB|RB|LB|WB|SW|\bDF\b|DEF|백|수비/.test(p)) return 'DF';
    if(/DM|CM|AM|RM|LM|\bMF\b|MID|미드/.test(p)) return 'MF';
    if(/ST|CF|\bFW\b|WG|RW|LW|WF|FWD|공격/.test(p)) return 'FW';
    return 'ETC';
  };
  const order=['DF','MF','FW','ETC','GK'];
  const labels={DF:'🛡 수비',MF:'🎯 미드필더',FW:'⚡ 공격',ETC:'· 기타',GK:'🧤 골키퍼'};
  const buckets={}; order.forEach(k=>buckets[k]=[]);
  _players.forEach(p=>buckets[groupOf(p.position)].push(p));
  order.forEach(k=>buckets[k].sort((a,b)=>(a.position||'').localeCompare(b.position||'','ko')||(a.name||'').localeCompare(b.name||'','ko')));
  const rowHtml=p=>'<div class="player-row" onclick="openPedit(\''+p.id+'\')">'
    +'<div><div class="player-name">'+escHtml(p.name||'—')+'</div><div class="player-pos">'+escHtml(p.position||'—')+'</div></div>'
    +'<div style="text-align:right;font-size:11px;color:var(--text3)">MAS '+(p.mas||'—')+'<br>MSS '+(p.mss||'—')+'</div></div>';
  let html='<div style="font-size:11px;color:var(--text3);margin-bottom:8px">탭하여 편집 · '+_players.length+'명</div>';
  order.forEach(k=>{ if(!buckets[k].length) return;
    html+='<div style="font-size:11px;font-weight:700;color:var(--text3);margin:12px 0 6px;letter-spacing:.5px">'+labels[k]+' <span style="font-weight:400">'+buckets[k].length+'명</span></div>'+buckets[k].map(rowHtml).join('');
  });
  el.innerHTML=html;
}
function openPedit(id){
  const p=_players.find(x=>x.id===id); if(!p) return;
  document.getElementById('pedit-id').value=p.id;
  document.getElementById('pedit-title').textContent=(p.name||'선수')+' 편집';
  document.getElementById('pedit-name').value=p.name||'';
  document.getElementById('pedit-position').value=p.position||'';
  document.getElementById('pedit-mas').value=p.mas??'';
  document.getElementById('pedit-mss').value=p.mss??'';
  document.getElementById('pedit-overlay').style.display='flex';
}
function closePedit(e){ if(e&&e.target!==e.currentTarget) return; document.getElementById('pedit-overlay').style.display='none'; }
async function savePedit(){
  const id=document.getElementById('pedit-id').value;
  const upd={ name:document.getElementById('pedit-name').value.trim(), position:document.getElementById('pedit-position').value.trim()||null,
    mas:parseFloat(document.getElementById('pedit-mas').value)||null, mss:parseFloat(document.getElementById('pedit-mss').value)||null };
  if(!upd.name){ showToast('이름을 입력하세요'); return; }
  const {error}=await supa.from('player_profiles').update(upd).eq('id',id);
  if(error){ showToast('저장 실패: '+error.message); return; }
  const p=_players.find(x=>x.id===id); if(p) Object.assign(p,upd);
  closePedit(); showToast('저장됨');
  if(document.getElementById('pmgmt-overlay').style.display!=='none') renderPmRoster(document.getElementById('pmgmt-content'));
}

// 경기 데이터 / Match Max
async function renderPmMatch(el){
  const {data:matches}=await supa.from('match_records')
    .select('match_date,opponent,home_away,player_id,duration,td,mpm,band4_td,band5_td,accel,rhie,result,score,time_type')
    .order('match_date',{ascending:false}).limit(400);
  const ft=(matches||[]).filter(r=>(r.time_type||'FT')==='FT');
  const keys=[...new Set(ft.map(r=>r.match_date+'__'+r.opponent))].sort((a,b)=>b.localeCompare(a)).slice(0,12);
  if(!keys.length){ el.innerHTML='<div class="empty-state"><p>경기 데이터 없음</p></div>'; return; }
  window._pmMatchRows=ft;
  el.innerHTML=keys.map(k=>{
    const [d,opp]=k.split('__');

    return '<div class="card" style="margin:0 0 10px;cursor:pointer" onclick="togglePmMatch(this,this.dataset.k)" data-k="'+escHtml(k)+'">'

      +'</div><div class="pm-match-detail" style="display:none;margin-top:10px"></div></div>';

// ══════════════════════════════════════════════════════
// CRI 계산
// ══════════════════════════════════════════════════════
function calcACWR(sessions,today){
  // 날짜별 합산 (오전+오후 세션은 하루치로 계산)
  const byDate={};
  sessions.forEach(s=>{
    const sRPE=(parseFloat(s.rpe)||0)*(parseFloat(s.dur)||0);
    if(!sRPE) return;
    byDate[s.date]=(byDate[s.date]||0)+sRPE;
  });
  const tD=new Date(today);
  let acute=0,cSum=0;
  Object.entries(byDate).forEach(([date,sRPE])=>{
    const d=Math.floor((tD-new Date(date))/86400000);
    if(d>=0&&d<7) acute+=sRPE;
    if(d>=0&&d<28) cSum+=sRPE;
  });
  // 휴식일도 0으로 간주 → 28일 전체로 나눔 (표준 롤링 평균, 웹앱과 동일 공식)
  const chronic=(cSum/28)*7;
  const acwr=chronic>0?acute/chronic:null;
  return{acute:Math.round(acute),chronic:Math.round(chronic),acwr};
}
function calcMVExposure(sessions,mss,today){
  if(!mss||mss<=0) return null;
  const zone5=mss*0.9;
  const tD=new Date(today);
  const diff=d=>Math.floor((tD-new Date(d))/86400000);
  let zone5Days=0,totalDays=0,lastExposed=null,maxSpeedWeek=0;
  [...sessions].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(s=>{
    const d=diff(s.date);
    if(d<0||d>=21) return;
    totalDays++;
    const spd=parseFloat(s.maxSpeed)||0;
    if(spd>=zone5){zone5Days++;if(lastExposed===null||d<lastExposed)lastExposed=d;}
    if(d<7&&spd>maxSpeedWeek) maxSpeedWeek=spd;
  });
  const daysSinceExposed=lastExposed!==null?lastExposed:99;
  const pctMSS=mss>0?(maxSpeedWeek/mss)*100:0;
  return{exposureRatio:totalDays>0?zone5Days/totalDays:0,daysSinceExposed,maxSpeedWeek,pctMSS};
}
function calcWellnessRisk(wellness7,todayW){
  if(!todayW||!wellness7.length) return null;
  const avg=f=>wellness7.reduce((a,r)=>a+(r[f]||0),0)/wellness7.length;
  const base=avg('fatigue')+avg('sleep_quality')+avg('stress')+avg('muscle_soreness');
  const tod=(todayW.fatigue||0)+(todayW.sleep_quality||0)+(todayW.stress||0)+(todayW.muscle_soreness||0);
  const dropPct=base>0?(base-tod)/base:0;
  return{baseline:(base/4).toFixed(1),todayAvg:(tod/4).toFixed(1),dropPct,absScore:tod};
}
function calcRiskLevel(acwr,mvExp,wellData){
  let score=0;const flags=[];
  if(acwr!==null){
    if(acwr>1.5){score+=3;flags.push({type:'ACWR',msg:'ACWR '+acwr.toFixed(2)+' — 급성 과부하'});}
    else if(acwr>1.3){score+=2;flags.push({type:'ACWR',msg:'ACWR '+acwr.toFixed(2)+' — 부하 주의'});}
    else if(acwr<0.8&&acwr>0){score+=1;flags.push({type:'ACWR',msg:'ACWR '+acwr.toFixed(2)+' — 과소부하'});}
  }
  if(mvExp!==null){
    if(mvExp.daysSinceExposed>=14){score+=3;flags.push({type:'MV',msg:'최고속도 '+mvExp.daysSinceExposed+'일 미노출'});}
    else if(mvExp.daysSinceExposed>=7){score+=2;flags.push({type:'MV',msg:'최고속도 '+mvExp.daysSinceExposed+'일 미노출'});}
    else if(mvExp.pctMSS<80){score+=1;flags.push({type:'MV',msg:'MSS '+mvExp.pctMSS.toFixed(0)+'% — 노출 부족'});}
  }
  if(wellData!==null){
    if(wellData.absScore<=8){score+=2;flags.push({type:'W',msg:'웰니스 '+wellData.absScore+'/20 — 과훈련 위험'});}
    else if(wellData.dropPct>=0.25){score+=2;flags.push({type:'W',msg:'웰니스 '+(wellData.dropPct*100).toFixed(0)+'% 급락'});}
    else if(wellData.dropPct>=0.15){score+=1;flags.push({type:'W',msg:'웰니스 '+(wellData.dropPct*100).toFixed(0)+'% 하락'});}
  }
  const level=score>=4?'red':score>=2?'amber':score>=1?'yellow':'green';
  return{score,level,flags};
}

<script>
(function(){
  let _errSent = 0;
  const _errSeen = new Set();
  function _reportErr(message, stack){
    try {
      if(_errSent >= 5 || typeof supa === 'undefined' || !supa) return; // 세션당 최대 5건
      const key = String(message||'').slice(0,120);
      if(_errSeen.has(key)) return; // 같은 에러 반복 방지
      _errSeen.add(key); _errSent++;
      supa.from('app_errors').insert({
        app: 'coach-mobile',
        club_id: null,
        user_info: (typeof currentUser!=='undefined' && currentUser && currentUser.email) || null,
        message: String(message||'').slice(0,500),
        stack: String(stack||'').slice(0,2000),
        url: location.pathname + location.hash.slice(0,100),
        user_agent: navigator.userAgent.slice(0,200)
      }).then(()=>{}, ()=>{}); // 실패해도 조용히 무시 (테이블 없어도 안전)
    } catch(_e) {}
  }
  window.addEventListener('error', e => _reportErr(e.message, e.error && e.error.stack));
  window.addEventListener('unhandledrejection', e => _reportErr(
    (e.reason && e.reason.message) || String(e.reason), e.reason && e.reason.stack));
})();
</script>
